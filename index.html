<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Foundry Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: "Louize";
  src: local("Louize");
  font-display: swap;
}

@font-face {
  font-family: "Louize Italic";
  src: local("Louize Italic"), local("Louize-Italic");
  font-style: italic;
  font-display: swap;
}

@font-face {
  font-family: "Louize Bold";
  src: local("Louize Bold"), local("Louize-Bold");
  font-weight: 700;
  font-display: swap;
}

:root {
  --navy: #1e2530;
  --orange-red: #c84826;
  --amber: #f6a85d;
  --cream: #f0ead8;
  --ivory: #fafaf2;
  --taupe: #7a6b5a;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "DM Sans", sans-serif;
  color: var(--navy);
  background:
    radial-gradient(circle at top, rgba(246, 168, 93, 0.1), transparent 28%),
    radial-gradient(circle at bottom right, rgba(200, 72, 38, 0.12), transparent 30%),
    linear-gradient(180deg, #2b3442 0%, #151b24 100%);
}

body.preview-embed {
  overflow: hidden;
  background: linear-gradient(180deg, #1f2733 0%, #151b24 100%);
}

button,
input,
textarea,
select {
  font: inherit;
}

.narrow-message {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  padding: 48px 32px;
  background: var(--navy);
  color: var(--cream);
  align-items: center;
  justify-content: center;
  text-align: center;
}

.narrow-message strong {
  display: block;
  margin-bottom: 14px;
  font-family: "DM Serif Display", serif;
  font-size: clamp(2rem, 4vw, 2.8rem);
  color: var(--ivory);
}

.narrow-message p {
  max-width: 30rem;
  margin: 0 auto;
  line-height: 1.7;
}

.app-shell {
  position: relative;
  width: 100%;
  height: 100%;
  padding: 8px;
  display: grid;
  place-items: center;
  /* Single centered cell. The book-frame absorbs the full viewport at the
     1500/780 design ratio. Brand, meta chips, side nav buttons, and the
     status pill all float absolutely on top of the book so they don't
     steal vertical space. */
}

body.preview-embed .narrow-message {
  display: none !important;
}

body.preview-embed .app-shell {
  width: 1540px;
  height: 980px;
  padding: 22px 26px 26px;
  transform-origin: top left;
  transform: scale(var(--preview-scale, 0.6));
}

body.preview-embed .book-frame,
body.preview-embed .controls {
  width: 1480px;
}

body.preview-embed .book-frame {
  height: 860px;
}

body.preview-embed .hint {
  font-size: 0.68rem;
}

body.preview-embed .nav-button {
  width: 46px;
  height: 46px;
}

.ambient-glow,
.ambient-glow::before,
.ambient-glow::after {
  position: absolute;
  inset: auto;
  content: "";
  pointer-events: none;
  border-radius: 999px;
  filter: blur(36px);
}

.ambient-glow {
  top: 2%;
  left: 7%;
  width: 26vw;
  height: 16vw;
  background: rgba(246, 168, 93, 0.08);
}

.ambient-glow::before {
  top: 36vh;
  left: 59vw;
  width: 22vw;
  height: 18vw;
  background: rgba(200, 72, 38, 0.07);
}

.ambient-glow::after {
  top: 60vh;
  left: 18vw;
  width: 20vw;
  height: 14vw;
  background: rgba(240, 234, 216, 0.05);
}

.topbar {
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  flex: 0 0 auto;
}

.brand-lockup {
  display: flex;
  align-items: center;
  gap: 14px;
  color: rgba(250, 250, 242, 0.86);
}

.brand-lockup img {
  width: 44px;
  height: 44px;
  object-fit: contain;
}

.brand-copy {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.brand-copy span {
  font-family: "DM Mono", monospace;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(240, 234, 216, 0.62);
}

.brand-copy strong {
  font-family: "DM Serif Display", serif;
  font-size: 1.25rem;
  font-weight: 400;
  color: var(--ivory);
}

.topbar-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(240, 234, 216, 0.74);
}

.meta-chip {
  border: 1px solid rgba(240, 234, 216, 0.12);
  background: rgba(240, 234, 216, 0.07);
  backdrop-filter: blur(16px);
  border-radius: 999px;
  padding: 10px 14px;
  font-family: "DM Mono", monospace;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

a.meta-chip,
button.meta-chip {
  color: inherit;
  text-decoration: none;
}

button.meta-chip {
  cursor: pointer;
}

.book-frame {
  position: relative;
  z-index: 2;
  /* Width is the smallest of: parent width, hard cap 1700px, OR the width
     that keeps the book within the viewport height. The third term means
     the book never overflows vertically -- the bottom cannot be cut off. */
  width: min(100%, 1700px, calc((100dvh - 16px) * 1500 / 780));
  aspect-ratio: 1500 / 780;
  perspective: 2800px;
}

.book-surface {
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(8, 10, 15, 0.7), rgba(13, 17, 23, 0.9));
  box-shadow:
    0 28px 80px rgba(0, 0, 0, 0.38),
    inset 0 1px 0 rgba(250, 250, 242, 0.06);
}

.book-surface::before,
.book-surface::after {
  content: "";
  position: absolute;
  top: 22px;
  bottom: 22px;
  width: 18px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(250, 250, 242, 0.24), rgba(250, 250, 242, 0.02)),
    repeating-linear-gradient(
      180deg,
      rgba(30, 37, 48, 0.08) 0,
      rgba(30, 37, 48, 0.08) 2px,
      rgba(250, 250, 242, 0.35) 2px,
      rgba(250, 250, 242, 0.35) 4px
    );
  opacity: 0.4;
}

.book-surface::before {
  left: 20px;
}

.book-surface::after {
  right: 20px;
}

.hinge {
  position: absolute;
  left: 50%;
  top: 2.5%;
  bottom: 2.5%;
  width: 34px;
  transform: translateX(-50%);
  border-radius: 999px;
  background:
    radial-gradient(circle at center, rgba(28, 33, 42, 0.16) 0, rgba(28, 33, 42, 0.08) 38%, rgba(255, 255, 255, 0) 72%),
    linear-gradient(90deg, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.06) 20%, rgba(20, 24, 31, 0.18) 50%, rgba(255, 255, 255, 0.06) 80%, rgba(255, 255, 255, 0.24) 100%);
  box-shadow:
    0 0 30px rgba(0, 0, 0, 0.16),
    inset 0 0 24px rgba(0, 0, 0, 0.12),
    inset 16px 0 22px rgba(255, 255, 255, 0.42),
    inset -16px 0 22px rgba(0, 0, 0, 0.1);
  z-index: 3;
  pointer-events: none;
}

.hinge::before,
.hinge::after {
  content: "";
  position: absolute;
  top: 2%;
  bottom: 2%;
  width: 64px;
  pointer-events: none;
}

.hinge::before {
  right: 50%;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.18) 46%, rgba(0, 0, 0, 0.06) 100%);
  filter: blur(8px);
}

.hinge::after {
  left: 50%;
  background: linear-gradient(90deg, rgba(0, 0, 0, 0.06), rgba(255, 255, 255, 0.16) 54%, rgba(255, 255, 255, 0) 100%);
  filter: blur(8px);
}

.book-stage {
  position: absolute;
  /* Symmetric inset so the book reads as vertically + horizontally
     centered in the viewport. */
  inset: 1.6%;
  overflow: hidden;
  border-radius: 20px;
  perspective: 3400px;
  transform-style: preserve-3d;
}

/* Subtle Foundry F watermark, bottom-right of every right page. The mark
   sits behind page chrome at low opacity so it reads as a paper watermark
   rather than UI. */
.page-right::after {
  content: "";
  position: absolute;
  right: 22px;
  bottom: 18px;
  width: 64px;
  height: 64px;
  background: url("assets/branding/foundry-logomark-orange.png") center/contain no-repeat;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}
/* The cover-right gets a slightly larger watermark since it has more
   negative space; the close-right keeps the standard size. */
.cover-right::after {
  width: 88px;
  height: 88px;
  right: 28px;
  bottom: 24px;
  opacity: 0.10;
}


/*
 * Letterbox scaling. The book renders at fixed "design" dimensions
 * (1410 x 820). A CSS transform scales it uniformly to fit whatever size
 * .book-stage is rendered at. Keeps every absolute-positioned element on
 * the page in proportion regardless of viewport.
 */
.book-scaler {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 1500px;
  height: 780px;
  transform: translate(-50%, -50%) scale(var(--book-scale, 1));
  transform-origin: center center;
}
.book-stage::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background:
    radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.12) 100%),
    linear-gradient(90deg, rgba(15, 19, 25, 0.2), transparent 10%, transparent 90%, rgba(15, 19, 25, 0.2));
  pointer-events: none;
  z-index: 6;
}

.spread {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-radius: 18px;
  background: var(--ivory);
  overflow: hidden;
  transform-origin: center center;
  transform-style: preserve-3d;
  opacity: 0;
  pointer-events: none;
  transition: none;
  /* Layered shadow: long ambient throw + mid + tight contact shadow,
     plus a crisp 1px inner edge so the book reads as a real, weighty
     object resting on the dark surface. */
  box-shadow:
    0 64px 120px -36px rgba(0, 0, 0, 0.60),
    0 30px 60px -8px rgba(0, 0, 0, 0.32),
    0 10px 22px rgba(0, 0, 0, 0.22),
    0 2px 4px rgba(0, 0, 0, 0.18),
    inset 0 0 0 1px rgba(30, 37, 48, 0.10);
}

.spread::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  background:
    /* Deeper inward page curve toward the gutter — the valley is now
       darker and slightly wider so the cover and back read as a real
       bound book rather than a flat pair of pages. May 2026 redesign. */
    linear-gradient(
      90deg,
      transparent 28%,
      rgba(0, 0, 0, 0.10) 36%,
      rgba(0, 0, 0, 0.22) 43%,
      rgba(0, 0, 0, 0.42) 48%,
      rgba(0, 0, 0, 0.55) 50%,
      rgba(0, 0, 0, 0.42) 52%,
      rgba(0, 0, 0, 0.22) 57%,
      rgba(0, 0, 0, 0.10) 64%,
      transparent 72%
    ),
    /* Highlight on the rising paper edge on each side of the valley —
       a touch brighter than before so the new deeper valley doesn't
       read as a smudge. */
    linear-gradient(
      90deg,
      transparent 36%,
      rgba(255, 253, 244, 0.10) 44%,
      transparent 47%,
      transparent 53%,
      rgba(255, 253, 244, 0.10) 56%,
      transparent 64%
    ),
    /* Outer-edge darkening at the far left/right of the spread, slightly
       deeper than before to imply the stack of pages beneath. */
    linear-gradient(
      90deg,
      rgba(0, 0, 0, 0.16),
      transparent 7%,
      transparent 93%,
      rgba(0, 0, 0, 0.16)
    );
}

.spread.current {
  opacity: 1;
  pointer-events: auto;
  z-index: 5;
  transform: translateX(0) rotateY(0deg) scale(1);
  filter: saturate(1);
}

.spread.next {
  opacity: 0;
  z-index: 4;
}

.spread.prev {
  opacity: 0;
  z-index: 3;
}

.spread.after {
  opacity: 0;
  z-index: 1;
}

.spread.before {
  opacity: 0;
  z-index: 1;
}

.page {
  position: relative;
  overflow: hidden;
}

.page-left {
  background:
    /* Page-edge stack: faint cream/tan hairlines along the bottom and
       outer (left) edges suggest the top sheet of a stack of paper. The
       lines are inside the page bounds because .book-stage clips overflow. */
    linear-gradient(180deg,
      transparent 0,
      transparent calc(100% - 7px),
      rgba(186, 168, 142, 0.22) calc(100% - 7px),
      rgba(186, 168, 142, 0.22) calc(100% - 6px),
      transparent calc(100% - 6px),
      transparent calc(100% - 5px),
      rgba(186, 168, 142, 0.18) calc(100% - 5px),
      rgba(186, 168, 142, 0.18) calc(100% - 4px),
      transparent calc(100% - 4px),
      transparent calc(100% - 3px),
      rgba(186, 168, 142, 0.14) calc(100% - 3px),
      rgba(186, 168, 142, 0.14) calc(100% - 2px),
      transparent calc(100% - 2px)
    ),
    linear-gradient(90deg,
      rgba(186, 168, 142, 0.20) 0,
      rgba(186, 168, 142, 0.20) 1px,
      transparent 1px,
      transparent 2px,
      rgba(186, 168, 142, 0.16) 2px,
      rgba(186, 168, 142, 0.16) 3px,
      transparent 3px,
      transparent 4px,
      rgba(186, 168, 142, 0.12) 4px,
      rgba(186, 168, 142, 0.12) 5px,
      transparent 5px
    ),
    /* Directional lighting: slightly brighter top-outer corner, softly cooler toward the gutter. */
    radial-gradient(ellipse at 15% 0%, rgba(255, 253, 244, 0.55), transparent 48%),
    linear-gradient(180deg, rgba(250, 250, 242, 0.12), transparent 24%),
    linear-gradient(120deg, rgba(30, 37, 48, 0.06), transparent 18%);
  /* Deeper inset shadows on the three outer sides imply more page thickness.
     The gutter side is handled by .spread::after. */
  box-shadow:
    inset 8px 0 14px -8px rgba(0, 0, 0, 0.18),
    inset 0 8px 12px -8px rgba(0, 0, 0, 0.12),
    inset 0 -10px 16px -10px rgba(0, 0, 0, 0.18);
}

.page-right {
  background:
    /* Page-edge stack: cream/tan hairlines on the bottom and outer (right)
       edge, mirroring .page-left. */
    linear-gradient(180deg,
      transparent 0,
      transparent calc(100% - 7px),
      rgba(186, 168, 142, 0.22) calc(100% - 7px),
      rgba(186, 168, 142, 0.22) calc(100% - 6px),
      transparent calc(100% - 6px),
      transparent calc(100% - 5px),
      rgba(186, 168, 142, 0.18) calc(100% - 5px),
      rgba(186, 168, 142, 0.18) calc(100% - 4px),
      transparent calc(100% - 4px),
      transparent calc(100% - 3px),
      rgba(186, 168, 142, 0.14) calc(100% - 3px),
      rgba(186, 168, 142, 0.14) calc(100% - 2px),
      transparent calc(100% - 2px)
    ),
    linear-gradient(270deg,
      rgba(186, 168, 142, 0.20) 0,
      rgba(186, 168, 142, 0.20) 1px,
      transparent 1px,
      transparent 2px,
      rgba(186, 168, 142, 0.16) 2px,
      rgba(186, 168, 142, 0.16) 3px,
      transparent 3px,
      transparent 4px,
      rgba(186, 168, 142, 0.12) 4px,
      rgba(186, 168, 142, 0.12) 5px,
      transparent 5px
    ),
    radial-gradient(ellipse at 85% 0%, rgba(255, 253, 244, 0.55), transparent 48%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.54), transparent 30%),
    linear-gradient(180deg, rgba(30, 37, 48, 0.02), transparent 100%);
  border-left: 1px solid rgba(30, 37, 48, 0.08);
  box-shadow:
    inset -8px 0 14px -8px rgba(0, 0, 0, 0.18),
    inset 0 8px 12px -8px rgba(0, 0, 0, 0.12),
    inset 0 -10px 16px -10px rgba(0, 0, 0, 0.18);
}

.paper-grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(transparent 93%, rgba(122, 107, 90, 0.07)),
    radial-gradient(circle at 20% 20%, rgba(122, 107, 90, 0.06) 0 1px, transparent 1px),
    radial-gradient(circle at 70% 60%, rgba(122, 107, 90, 0.04) 0 1px, transparent 1px);
  background-size: auto, 18px 18px, 24px 24px;
  mix-blend-mode: multiply;
  opacity: 0.42;
}


.cover-left {
  /* Hero photo full-bleed. No padding so the image fills edge to edge. */
  padding: 0;
  color: var(--ivory);
  overflow: hidden;
  background: var(--navy);
}

.cover-photo {
  position: absolute;
  inset: 0;
  background: url("assets/branding/friendly-students-2.png") center/cover;
}

.cover-photo-shade {
  /* Soft gradient over the photo so a small caption / chrome stays
     legible if added later, and so the cover edge has a graceful
     dark-to-light transition into the spine. */
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(20, 25, 33, 0.0) 30%, rgba(20, 25, 33, 0.55) 100%),
    linear-gradient(90deg, rgba(20, 25, 33, 0.18) 0%, rgba(20, 25, 33, 0.0) 32%);
}

.cover-photo-caption {
  position: absolute;
  left: 22px;
  bottom: 22px;
  z-index: 2;
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(250, 250, 242, 0.78);
  background: rgba(20, 25, 33, 0.55);
  padding: 6px 10px;
  border-radius: 999px;
  backdrop-filter: blur(6px);
}

.cover-left > *,
.cover-right > * {
  position: relative;
  z-index: 1;
}

/* The photo and its shade are absolutely positioned to fill .cover-left
   edge-to-edge; the universal `position: relative` above would otherwise
   collapse them to zero height. */
.cover-left > .cover-photo,
.cover-left > .cover-photo-shade {
  position: absolute;
  z-index: 0;
}
.cover-photo-caption {
  z-index: 2 !important;
}

.cover-logo {
  width: 64px;
  height: 64px;
  object-fit: contain;
  margin-bottom: 28px;
}

.eyebrow {
  font-family: "DM Mono", monospace;
  font-size: 0.72rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
}

.cover-left .eyebrow {
  color: rgba(240, 234, 216, 0.82);
}

.cover-title {
  max-width: 10ch;
  margin: 28px 0 18px;
  font-family: "DM Serif Display", serif;
  font-size: clamp(3rem, 4vw, 4.8rem);
  line-height: 0.94;
}

.cover-subtitle {
  max-width: 23rem;
  font-size: 1.05rem;
  line-height: 1.75;
  color: rgba(240, 234, 216, 0.84);
}

.cover-right {
  padding: 56px 54px 56px;
  background: linear-gradient(180deg, rgba(240, 234, 216, 0.92), rgba(250, 250, 242, 0.98));
  display: flex;
  align-items: center;
}

.cover-title-block {
  width: 100%;
  max-width: 36ch;
}

.cover-title-block .cover-logo {
  width: 56px;
  height: 56px;
  object-fit: contain;
  margin-bottom: 24px;
}

.cover-title-block .cover-eyebrow {
  display: block;
  margin-bottom: 18px;
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--orange-red);
}

.cover-title-block .cover-title {
  margin: 0 0 18px;
  font-family: "DM Serif Display", serif;
  font-size: clamp(2.3rem, 3.4vw, 3.6rem);
  line-height: 1.02;
  color: var(--navy);
  max-width: 14ch;
}

.cover-title-block .cover-subtitle {
  margin: 0 0 24px;
  font-family: "DM Sans", sans-serif;
  font-size: clamp(0.95rem, 1.1vw, 1.1rem);
  line-height: 1.55;
  color: rgba(30, 37, 48, 0.78);
  max-width: 36ch;
}

.cover-kicker {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 999px;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(122, 107, 90, 0.95);
  background: rgba(246, 168, 93, 0.16);
  border: 1px solid rgba(246, 168, 93, 0.34);
}

.toc-heading {
  /* More breathing room above the heading so it isn't cramped against
     the "Get Started" eyebrow. The TOC list below also gets a slight
     scale bump so the right page doesn't read as half-empty. */
  margin: 28px 0 22px;
  font-family: "DM Serif Display", serif;
  font-weight: 400;
  font-size: clamp(1.9rem, 2.6vw, 2.5rem);
  line-height: 1.05;
  color: var(--navy);
}

.closing-card {
  display: grid;
  gap: 18px;
  padding: 26px 26px 22px;
  border-radius: 22px;
}

.feature-title,
.section-title,
.close-title,
.note-title {
  margin: 0;
  font-family: "DM Serif Display", serif;
  font-weight: 400;
}

.note-copy,
.support-intro,
.close-copy,
.support-panel p {
  margin: 0;
  line-height: 1.7;
}

/* Same orange-link rule applied inside the expanded support-panel area
   so any inline links in summaries / panels match. (Was previously merged
   into the .note-copy selector list above, which accidentally gave all
   note-copy paragraphs an orange underline.) */
.support-panel a,
.support-panel a:link,
.support-panel a:visited,
.support-panel a:hover,
.support-panel a:active {
  color: var(--orange-red, #E8541A);
  text-decoration: underline;
}

.note-left,
.close-left {
  /* Equal top/bottom padding to match the other spreads' rhythm; slightly
     tighter on the sides to give content a comfortable measure rather
     than letting paragraphs run the full page width. */
  padding: 36px 56px 36px;
  display: flex;
  flex-direction: column;
}

/* Soft horizontal photo banner at the top of the intro left page.
   Uses the existing friendly-students-2.png (the same warm classroom
   shot already on the cover) so the intro picks up the cover's visual
   thread. Capped at 130px so it sets the mood without overpowering. */
.note-banner {
  position: relative;
  width: 100%;
  /* Taller so the photo + title overlay reads as a magazine-style hero. */
  height: 260px;
  margin-bottom: 22px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  /* Cream paper background under the photo so when the photo opacity is
     low the underlying page color shows through naturally. */
  background: rgba(244, 237, 224, 0.6);
}
.note-banner::before {
  /* Photo as a low-opacity background layer so the graphic reads as
     transparent / faded, blending into the page rather than dominating. */
  content: "";
  position: absolute;
  inset: 0;
  background: url("assets/branding/friendly-students-2.png") center 28%/cover;
  opacity: 0.55;
}
.note-banner::after {
  /* Subtle vignette so the bottom-left title sits on a slightly darker
     wedge and stays legible even where the photo is busy. */
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(20, 25, 33, 0.22) 0%, rgba(20, 25, 33, 0.0) 38%),
    linear-gradient(180deg, rgba(20, 25, 33, 0.0) 55%, rgba(20, 25, 33, 0.32) 100%);
}
.note-banner-title {
  position: absolute;
  left: 28px;
  bottom: 22px;
  z-index: 1;
  margin: 0;
  font-family: "DM Serif Display", Georgia, serif;
  font-weight: 400;
  font-size: clamp(2.1rem, 3.2vw, 3.1rem);
  line-height: 0.96;
  color: var(--ivory, #faf8f1);
  letter-spacing: -0.005em;
  text-shadow: 0 2px 18px rgba(20, 25, 33, 0.32);
  max-width: 88%;
}

/* Note banner title: optional accent half drops in italic when the
   reader flips to the note entry. The static half ("Theology.") stays
   put; .note-banner-title-anim ("For All.") starts hidden + raised and
   animates to its resting place when the .note-banner element gains
   the .is-active class. The class is toggled in the StPageFlip flip
   handler so the animation re-triggers every time the user lands on
   the note page (not just on first load). */
.note-banner-title { display: inline-block; }
.note-banner-title-static {
  display: inline;
}
.note-banner-title-anim {
  display: inline-block;
  margin-left: 0.34em;
  font-style: italic;
  /* Resting state. .is-active animates these toward 0/1. */
  opacity: 0;
  transform: translateY(-34px);
  will-change: opacity, transform;
}
.note-banner.is-active .note-banner-title-anim {
  animation: note-banner-dropin 0.85s 0.32s cubic-bezier(0.34, 1.42, 0.64, 1) forwards;
}
@keyframes note-banner-dropin {
  0%   { opacity: 0; transform: translateY(-34px); }
  62%  { opacity: 1; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Cap the body paragraph + footnote to a comfortable measure so they
   don't run edge-to-edge on a wide page. */
/* User asked to remove the orange "Courses in the Community" eyebrow
   on the intro left page. Keep the field in content.js (so /admin can
   restore it), but suppress the visual rendering. */
.note-left > .eyebrow.note-kicker { display: none; }

.note-left .note-copy,
.note-left .note-footnote {
  max-width: 58ch;
}

/* Note-points grid: tighter so the two cards sit closer to the headline
   and the price column has more breathing room. */
.note-left .note-points {
  margin-top: 18px;
  gap: 12px;
}

.note-right,
.close-right {
  padding: 54px 48px 36px;
}

.note-left {
  background:
    linear-gradient(180deg, rgba(250, 250, 242, 0.18), transparent 20%),
    url("assets/branding/foundry-vignette-reader-presenter.png") right -38px bottom 40px / 44% auto no-repeat,
    linear-gradient(180deg, #efe5cf, #fbf8ef 86%);
}

.note-kicker,
.close-kicker {
  color: var(--orange-red);
}

.note-title {
  /* The title moved into the banner as an overlay (.note-banner-title);
     hide the standalone h2 so we don't render the title twice. */
  display: none;
}

.note-copy {
  margin-top: 18px;
  max-width: 32rem;
  color: rgba(30, 37, 48, 0.84);
}

.note-points,
.closing-list,
.editorial-rules,
.support-list {
  display: grid;
  gap: 12px;
}

.note-points {
  margin-top: 28px;
  gap: 16px;
}

.note-point,
.editorial-rules article,
.closing-list article {
  padding: 16px 18px;
  border-radius: 12px;
}

.note-point {
  /* "Two paths" cards: warm cream surface with an orange accent rail and
     a baseline price band. */
  background: rgba(255, 255, 255, 0.78);
  border: 1px solid rgba(30, 37, 48, 0.08);
  border-left: 3px solid var(--orange-red, #C84826);
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "tag    price"
    "title  price"
    "copy   price";
  column-gap: 16px;
  row-gap: 4px;
  align-items: baseline;
}
.note-point .point-tag {
  grid-area: tag;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--orange-red, #C84826);
  font-weight: 600;
}
.note-point strong {
  grid-area: title;
  display: block;
  font-family: "DM Serif Display", Georgia, serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--navy);
  line-height: 1.2;
  margin: 0;
}
.note-point .point-copy {
  grid-area: copy;
  margin: 4px 0 0;
  font-size: 14px;
  line-height: 1.55;
  color: rgba(30, 37, 48, 0.84);
}
.note-point .point-price {
  grid-area: price;
  align-self: center;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  flex-shrink: 0;
}
.note-point .point-price .price-num {
  font-family: "DM Serif Display", Georgia, serif;
  font-size: 28px;
  color: var(--orange-red, #C84826);
  line-height: 1;
}
.note-point .point-price .price-unit {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(122, 107, 90, 0.92);
  margin-top: 4px;
}

.editorial-rules article {
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid rgba(30, 37, 48, 0.08);
}
.editorial-rules strong,
.closing-list strong {
  display: block;
  margin-bottom: 6px;
}

/* Single-line marketplace footnote below the two cards. */
.note-footnote {
  margin: 18px 0 0;
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: rgba(122, 107, 90, 0.92);
  line-height: 1.45;
}

.note-right {
  /* Vertical rhythm: eyebrow sits a bit in from the top, generous padding
     so the TOC has room without feeling sparse. */
  background: linear-gradient(180deg, rgba(250, 250, 242, 0.92), rgba(240, 234, 216, 0.92));
  padding: 56px 56px 36px !important;
}
.note-right .eyebrow.note-kicker {
  margin: 0 0 4px;
}

.editorial-rules {
  margin-top: 20px;
}

.feature-left {
  position: relative;
  /* Equal top/bottom padding so the page reads as balanced top-to-bottom. */
  padding: 32px 34px 32px;
  color: var(--navy);
  overflow: hidden;
  /* Flex column for the new Option-2 layout: header → eyebrow pill → hero
     image band → bottom 2-column grid. The grid uses flex: 1 so it fills
     the remaining vertical space below the hero. */
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(244, 237, 224, 0.96)),
    linear-gradient(180deg, rgba(250, 250, 242, 0.55), rgba(240, 234, 216, 0.45));
}

.feature-canvas {
  /* Flex column so the new Option-2 regions stack top-to-bottom. */
  position: relative;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  flex: 1;
  min-height: 0;
}

.feature-image-card {
  position: absolute;
  left: 50%;
  top: calc(var(--image-y, 10) * 1%);
  width: min(calc(var(--image-scale, 88) * 1%), 94%);
  transform: translateX(-50%);
}

.feature-image-card img {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  object-fit: contain;
  object-position: center;
  filter: var(--image-shadow, drop-shadow(0 12px 18px rgba(30, 37, 48, 0.16)));
}

.feature-genre {
  /* Now flows as a flex item at the top of the left page. */
  position: static;
  margin: 0 0 8px;
  font-family: var(--genre-font-family, "DM Mono", monospace);
  font-size: var(--genre-font-size, 24px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--orange-red);
  line-height: 1;
}

.feature-course-label {
  position: absolute;
  left: 0;
  top: calc(var(--course-label-y, 61) * 1%);
  width: min(calc(var(--course-label-width, 52) * 1%), 100%);
  font-family: var(--course-label-font-family, "DM Mono", monospace);
  font-size: var(--course-label-font-size, 12px);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(122, 107, 90, 0.92);
  line-height: 1;
}

/* New Option-2 layout: orange "★ Featured Course" pill replaces the gray
   .feature-course-label. Flows as a flex item just below the genre. */
.featured-eyebrow {
  display: inline-block;
  align-self: flex-start;
  margin: 0 0 14px;
  background: var(--orange-red, #E8541A);
  color: #FFFFFF;
  font-family: "Montserrat", "Segoe UI", sans-serif;
  font-size: calc(var(--course-label-font-size, 11) * 1px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 2px;
}

/* Hero image band: full page width, 3:2 ratio (our native asset format).
   flex-shrink: 0 prevents the bottom grid from squishing it. */
.featured-hero {
  /* Width is slider-driven (--image-scale). The Q2 2026 "Graphic vertical
     position" slider drives a translateY nudge via --image-offset-y
     (-20%..+20%) — the legacy absolute --image-y is left inert. */
  width: calc(var(--image-scale, 85) * 1%);
  transform: translateY(calc(var(--image-offset-y, 0) * 1%));
  aspect-ratio: 3 / 2;
  border-radius: 4px;
  box-shadow: 0 5px 16px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  margin: 0 auto 16px;
  flex-shrink: 0;
  background: var(--ivory);
}
.featured-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: var(--image-shadow, none);
}

/* Bottom region: 2-column grid that fills the remaining space.
   Left = fluid text block; right = fixed-width instructor card. */
.featured-bottom {
  display: grid;
  /* Right column width is slider-driven (--instructor-card-width, default
     200px). Description column stays 1fr so it auto-fills any space the
     faculty card gives back when it shrinks. align-items: stretch keeps
     the previous behavior by default; individual cells opt out via
     --description-align / --instructor-card-align when an explicit height
     is set. */
  grid-template-columns: 1fr calc(var(--instructor-card-width, 200) * 1px);
  gap: var(--card-gap, 24px);
  align-items: stretch;
  flex: 1;
  min-height: 0;
}

.featured-text-block {
  display: flex;
  flex-direction: column;
  /* When height is auto (slider 0), centering keeps text vertically balanced
     in the row. When an explicit height is set, renderSpread switches
     --description-justify to 'flex-start' so growing the box doesn't slide
     text downward via re-centering. */
  justify-content: var(--description-justify, center);
  /* Internal padding so the description doesn't touch the page edge on
     the left or the instructor card on the right. */
  padding-left: 16px;
  padding-right: 12px;
  /* Slider-driven width (50-100%). At 100% the cell stretches as before. */
  width: var(--description-width-css, 100%);
  /* Slider-driven nudges. Translate keeps the grid layout stable; the
     element is shifted visually without reflowing the whole row.
     --description-height-css is set inline by renderSpread to 'auto' (when
     the slider is at 0) or '<n>px' (otherwise). When explicit, --description-align
     is also set to 'start' so the cell breaks out of grid-stretch and can be
     taller or shorter than the faculty card. */
  transform: translate(calc(var(--description-x, 0) * 1%), calc(var(--description-y, 0) * 1%));
  height: var(--description-height-css, auto);
  align-self: var(--description-align, stretch);
}
.featured-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: var(--description-title-font-size, 22px);
  font-weight: 700;
  color: #1A1A1A;
  margin: 0 0 8px 0;
  line-height: 1.18;
}
.featured-desc {
  font-family: "Montserrat", "Segoe UI", sans-serif;
  font-size: var(--description-font-size, 14px);
  line-height: 1.55;
  color: #3A3128;
  margin: 0;
}

/* Compact instructor card front face. The back face (bio) is unchanged --
   only the front layout is restyled. The card still uses the existing
   .faculty-card flip mechanism (transform-style: preserve-3d, click toggles
   .is-flipped). */
.featured-instructor-card {
  position: relative;
  background: #FDFAF0;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-left: 3px solid var(--orange-red, #E8541A);
  border-radius: 3px;
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.featured-instructor-avatar {
  width: calc(var(--faculty-avatar-size, 56) * 1px);
  height: calc(var(--faculty-avatar-size, 56) * 1px);
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #FFFFFF;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
  margin: 0 auto 10px;
}
.featured-instructor-avatar.is-fallback {
  background: #FDFAF0;
  display: grid;
  place-items: center;
}
.featured-instructor-avatar.is-fallback img {
  width: 60%;
  height: 60%;
  object-fit: contain;
}
.featured-instructor-label {
  font-family: "Montserrat", "Segoe UI", sans-serif;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: #888888;
  text-transform: uppercase;
  margin-bottom: 3px;
  font-weight: 600;
}
.featured-instructor-name {
  font-family: "Montserrat", "Segoe UI", sans-serif;
  font-size: calc(var(--faculty-name-size, 13) * 1px);
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.2;
  margin: 0 0 0;
}
.featured-instructor-bio-link {
  font-family: "Montserrat", "Segoe UI", sans-serif;
  font-size: calc(var(--faculty-blurb-size, 9) * 1px);
  color: var(--orange-red, #E8541A);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  border-top: 1px dashed rgba(0, 0, 0, 0.18);
  padding-top: 8px;
  margin-top: 10px;
  width: 100%;
}

/* Right-page header pair: orange uppercase genre matching the left page's
   .feature-genre, plus a smaller mono "Other Popular Courses" subheader
   matching .feature-course-label. Static-positioned so they flow above
   the support list rather than sitting at fixed Y like their absolute-
   positioned cousins on the left page. */
.section-genre {
  /* Consumes --right-heading-size and --right-heading-width from the
     .feature-right inline style (set in renderSpread from layout.rightHeadingFontSize
     and layout.rightHeadingWidthPercent). The legacy .section-title rule
     below carried these vars but was display:none and never reached the DOM. */
  margin: 0;
  font-family: "DM Mono", monospace;
  font-size: var(--right-heading-size, 24px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--orange-red);
  line-height: 1;
  align-self: flex-start;
  width: min(calc(var(--right-heading-width, 100) * 1%), 100%);
}
.section-label {
  margin: 0;
  font-family: "DM Mono", monospace;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(122, 107, 90, 0.92);
  line-height: 1;
  align-self: flex-start;
}

.feature-block {
  position: absolute;
  left: calc(var(--block-x, 0) * 1%);
  top: calc(var(--block-y, 50) * 1%);
  width: min(calc(var(--block-width, 100) * 1%), 100%);
  margin: 0;
  text-align: var(--block-text-align, left);
  font-family: var(--block-font-family, "DM Sans", sans-serif);
  font-size: var(--block-font-size, 16px);
  line-height: var(--block-line-height, 1.5);
  white-space: pre-wrap;
}

.feature-block-header {
  font-weight: 400;
  letter-spacing: -0.02em;
}

.feature-block-header,
.feature-block-quote {
  font-weight: 400;
}

.feature-block-text {
  color: rgba(30, 37, 48, 0.8);
}

.feature-block-quote {
  margin: 0;
  padding: 14px 16px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.74);
  border: 1px solid rgba(30, 37, 48, 0.08);
  color: rgba(30, 37, 48, 0.72);
}

/*
 * Faculty flip card
 *
 * Structure:
 *   .faculty-card-slot   positioning wrapper on the page; provides perspective
 *     button.faculty-card  clickable / focusable; toggles .is-flipped
 *       .faculty-card-inner  the 3D-rotating container (preserve-3d)
 *         .faculty-card-face.faculty-card-front  headshot + name + blurb
 *         .faculty-card-face.faculty-card-back   bio + return affordance
 */

.faculty-card-slot {
  position: absolute;
  left: 50%;
  top: calc(var(--faculty-y, 82) * 1%);
  width: min(var(--faculty-width, 84%), 100%);
  max-width: none;
  transform: translateX(-50%);
  perspective: 1400px;
}

/* Option-2 layout: when the slot is inside the bottom grid, it should fill
   its grid cell rather than absolutely positioning itself to the page. */
.featured-bottom .faculty-card-slot.featured-instructor-slot {
  position: relative;
  left: auto;
  top: auto;
  /* Slider-driven nudges via --instructor-card-x / --instructor-card-y.
     Width comes from the parent grid-template (--instructor-card-width).
     --instructor-card-height-css is 'auto' by default (cell stretches to
     row height) or '<n>px' when the slider is non-zero, in which case
     --instructor-card-align flips to 'start' so the card can be shorter
     than the description column. */
  transform: translate(calc(var(--instructor-card-x, 0) * 1%), calc(var(--instructor-card-y, 0) * 1%));
  width: 100%;
  perspective: 1400px;
  align-self: var(--instructor-card-align, stretch);
  height: var(--instructor-card-height-css, 100%);
}
.featured-bottom .faculty-card.featured-instructor-card {
  min-height: 0;
  height: 100%;
}
/* The .faculty-card-face inside the new card is positioned absolutely
   (existing rule) so the front and back overlap for the flip. The new
   front face needs all the centered-content styling we defined on the
   outer .featured-instructor-card -- copy it onto the front face too. */
.featured-bottom .faculty-card-face.featured-instructor-front {
  background: #FDFAF0;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-left: 3px solid var(--orange-red, #E8541A);
  border-radius: 3px;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  box-shadow: none;
}

.faculty-card {
  all: unset;
  display: block;
  width: 100%;
  cursor: pointer;
  position: relative;
  min-height: calc(var(--faculty-card-height, 190) * 1px);
  transform-style: preserve-3d;
}

.faculty-card:focus-visible {
  outline: 2px solid var(--amber, #f6a85d);
  outline-offset: 3px;
  border-radius: 20px;
}

.faculty-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: inherit;
  transition: transform 0.7s cubic-bezier(0.3, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.faculty-card.is-flipped .faculty-card-inner {
  transform: rotateY(180deg);
}

.faculty-card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 18px;
  padding: 16px 20px 30px;
  background: linear-gradient(180deg, #e4ecf3 0%, #d6e1ea 100%);
  border: 1px solid rgba(90, 120, 150, 0.18);
  box-shadow:
    0 14px 28px rgba(30, 60, 100, 0.10),
    0 4px 8px rgba(30, 60, 100, 0.06);
  overflow: hidden;
}

.faculty-card-front {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  column-gap: 18px;
  align-items: center;
}

.faculty-card-back {
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  gap: 8px;
  /* Let the bio block fill the card; the "BACK TO FRONT" hint anchors
     to the bottom-right via its own absolute positioning. */
  align-items: stretch;
}

.faculty-avatar-large {
  width: calc(var(--faculty-avatar-size, 100) * 1px);
  height: calc(var(--faculty-avatar-size, 100) * 1px);
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid rgba(255, 255, 255, 0.92);
  box-shadow: 0 6px 14px rgba(30, 60, 100, 0.18);
  background: rgba(255, 255, 255, 0.75);
  display: grid;
  place-items: center;
}

.faculty-avatar-large img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

.faculty-avatar-large.faculty-card-mark img {
  width: 48%;
  height: 48%;
}

.faculty-kicker {
  display: block;
  margin-bottom: 4px;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(50, 75, 105, 0.78);
}

.faculty-card-copy {
  min-width: 0;
}

.faculty-card-copy strong {
  display: block;
  margin-bottom: 4px;
  font-family: "Montserrat", sans-serif;
  font-size: calc(var(--faculty-name-size, 15) * 1px);
  font-weight: 600;
  letter-spacing: 0.01em;

/* ---- StPageFlip integration ---- */
/*
 * StPageFlip renders pages with its own canvas-based 3D mesh deformation
 * (the Heyzine-style corner peel). Our content (faculty card, supporting
 * list, cover, etc.) lives INSIDE each page wrapper; the library handles
 * the page-flip animation around them.
 *
 * The library replaces the old .book-scaler / .spread / .flip-leaf model
 * entirely when active. In editor preview mode (body.preview-embed), we
 * fall back to the original rendering so the editor's preview iframe is
 * unaffected.
 */
#pageflip-book {
  width: 100%;
  height: 100%;
  position: relative; /* own stacking context so flip-animation z-index beats the gutter overlay */
}

/* Center-gutter shadow overlay (replaces .spread::after for PageFlip
   mode). Floats absolutely over the book center so the spread reads as
   a real magazine binding even though the library no longer uses our
   .spread element. */
.book-gutter-overlay {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 14%;
  max-width: 220px;
  transform: translateX(-50%);
  pointer-events: none;
  /* z-index: 2 keeps the overlay above static page content (which sits at 0
     inside #pageflip-book) while staying below the library's flip-animation
     elements (which use much higher internal values). #pageflip-book must
     have position:relative so these z-indices are scoped to its stacking
     context rather than competing with the overlay from the outside. */
  z-index: 2;
  background:
    /* Soft inward page curve toward the gutter -- darker valley at the
       binding seam, fading outward into each page. Same shape as the old
       .spread::after gradient, scaled to a narrower overlay band. */
    linear-gradient(
      90deg,
      transparent 0%,
      rgba(0, 0, 0, 0.06) 14%,
      rgba(0, 0, 0, 0.16) 32%,
      rgba(0, 0, 0, 0.30) 48%,
      rgba(0, 0, 0, 0.36) 50%,
      rgba(0, 0, 0, 0.30) 52%,
      rgba(0, 0, 0, 0.16) 68%,
      rgba(0, 0, 0, 0.06) 86%,
      transparent 100%
    ),
    /* Subtle bright lift on each side of the valley -- glossy paper. */
    linear-gradient(
      90deg,
      transparent 12%,
      rgba(255, 253, 244, 0.05) 28%,
      transparent 42%,
      transparent 58%,
      rgba(255, 253, 244, 0.05) 72%,
      transparent 88%
    );
}

/*
 * The .spf-page wrapper is sized by StPageFlip (we pass per-page width
 * and height into the library). The actual .page content inside is
 * rendered at the design's fixed 750x780 logical size and visually
 * scaled to fit via transform: scale() (set via JS, see applySpfPageScale).
 *
 * This is the same letterbox approach our legacy .book-scaler used: the
 * library handles flip mechanics + outer page-wrapper sizing; we handle
 * proportional scaling of our DOM content. Without this, content
 * rendered at design pixels overflows on small screens / leaves big
 * empty space on large ones.
 */
.spf-page {
  /* StPageFlip adds .stf__item to this element at runtime, which carries
     transform-style: preserve-3d. preserve-3d defeats overflow:hidden on
     descendants, so we delegate clipping + the opaque base background to
     an inner .spf-page-clip wrapper that has the default flat
     transform-style. */
  position: relative;
  /* Page navigation is via arrow buttons / keys only, so any cursor drag
     inside the spread is incidental -- prevent it from leaving a blue
     text-selection highlight streaked across the page. */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
.spf-page-clip {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: var(--ivory);
  /* Default transform-style: flat -- this is the layer where overflow:hidden
     actually works, so the 750x780 .page child below cannot overhang the
     wrapper's pageWidth x pageHeight box during a backward flip. */
}
.spf-page-clip .page {
  position: absolute;
  top: 0;
  left: 0;
  width: 750px;
  height: 780px;
  transform-origin: top left;
  /* Independent opaque base behind the mostly-transparent
     .page-left / .page-right gradients, so the page reads as solid even
     if the wrapper's background is under-painted by the library's
     clip-path + 3D transform interaction. */
  background: var(--ivory);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  /* transform: scale(...) is set via JS on every (re)build. */
}

/* Backward-flip paint-order fix --
 * Applied via JS to the static current-spread pages while a backward flip
 * is in progress. The library's 3D rendering context (perspective on
 * .stf__block + transform-style: preserve-3d on .stf__item) makes
 * Chromium ignore both z-index AND DOM order for sibling .stf__item
 * paint, so we instead force the source pages out of view with a CSS
 * class. Class survives the library's per-frame `cssText` resets
 * because cssText only replaces inline style, not class state. */
.stf__item.spfg-flip-hide {
  opacity: 0 !important;
}

/* Backward-flip background fix --
 * Applied to the .stf__item that currently has the `bottomPage` role
 * during a backward flip (z-index 3, drawSoft inline transform). The
 * library normally clips bottomPage to a polygon describing the
 * "revealed" area under the peel; without clip the page paints across
 * its full element bounds, giving the user a fully-visible destination
 * spread under the peel animation instead of black space outside the
 * polygon. */
.stf__item.spfg-flip-unclip {
  clip-path: none !important;
  -webkit-clip-path: none !important;
}

/* ---- Floating overlay chrome (replaces the old topbar + footer) ---- */
/*
 * The topbar and footer used to consume vertical layout space, squeezing
 * the book.  Now everything floats absolutely on top of the book stage:
 *   - .brand-overlay   top-left, Foundry logo + tagline
 *   - .meta-overlay    top-right, sound toggle + edit-copy link
 *   - .nav-side        left/right edges, vertically-centered prev/next
 *   - .status-overlay  bottom-center, page count + theme + arrow hint
 */
.brand-overlay {
  position: absolute;
  top: 14px;
  left: 16px;
  z-index: 12;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px 8px 12px;
  border-radius: 999px;
  background: rgba(20, 25, 33, 0.42);
  border: 1px solid rgba(240, 234, 216, 0.10);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: rgba(250, 250, 242, 0.86);
  pointer-events: auto;
}

.brand-overlay img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.brand-overlay .brand-copy {
  display: flex;
  flex-direction: column;
  gap: 1px;
  line-height: 1;
}

.brand-overlay .brand-copy span {
  font-family: "DM Mono", monospace;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: rgba(240, 234, 216, 0.62);
}

.brand-overlay .brand-copy strong {
  font-family: "DM Serif Display", serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--ivory);
  letter-spacing: 0.005em;
}

.meta-overlay {
  position: absolute;
  top: 14px;
  right: 16px;
  z-index: 12;
  display: flex;
  align-items: center;
  gap: 8px;
  pointer-events: auto;
}

.meta-overlay .meta-chip {
  background: rgba(20, 25, 33, 0.42);
  border: 1px solid rgba(240, 234, 216, 0.10);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 999px;
  padding: 8px 13px;
  font-family: "DM Mono", monospace;
  font-size: 0.66rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(240, 234, 216, 0.84);
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
}

.meta-overlay .meta-chip:hover {
  background: rgba(246, 168, 93, 0.16);
  border-color: rgba(246, 168, 93, 0.5);
  color: var(--ivory);
}

a.meta-chip {
  text-decoration: none;
}

/* Side nav buttons -- absolute on the .app-shell, vertically centered */
.nav-side {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 12;
  width: 56px;
  height: 56px;
  /* Inherits the visual treatment from .nav-button (background, border,
     blur). We just bump the size and position. */
}

.nav-side svg {
  width: 22px;
  height: 22px;
}

.nav-side:hover:not(:disabled) {
  transform: translateY(calc(-50% - 1px));
}

.nav-side-prev {
  left: 14px;
}

.nav-side-next {
  right: 14px;
}

/* Bottom-center status pill */
.status-overlay {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 12;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px;
  border-radius: 999px;
  background: rgba(20, 25, 33, 0.42);
  border: 1px solid rgba(240, 234, 216, 0.10);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: rgba(240, 234, 216, 0.84);
  pointer-events: auto;
  font-family: "DM Mono", monospace;
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.status-overlay .page-status {
  min-width: 76px;
  text-align: center;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  color: var(--ivory);
}

.status-overlay .status-chip {
  background: transparent;
  border: 0;
  padding: 0;
  letter-spacing: 0.16em;
  font-size: 0.68rem;
  color: rgba(246, 168, 93, 0.92);
}

.status-overlay .hint {
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: rgba(240, 234, 216, 0.6);
}

.status-divider {
  color: rgba(240, 234, 216, 0.32);
  font-size: 0.85rem;
  line-height: 1;
}

.status-divider-quiet {
  color: rgba(240, 234, 216, 0.18);
}

/* Hide all floating chrome inside the editor's preview iframe -- the
   editor already provides its own controls; the overlays would just clutter. */
body.preview-embed .brand-overlay,
body.preview-embed .meta-overlay,
body.preview-embed .nav-side,
body.preview-embed .status-overlay {
  display: none !important;
}

/* On very narrow viewports collapse the brand text and just keep the mark */
@media (max-width: 720px) {
  .brand-overlay .brand-copy {
    display: none;
  }
  .brand-overlay {
    padding: 8px;
  }
  .meta-overlay .meta-chip {
    padding: 7px 10px;
    font-size: 0.6rem;
  }
}

/* ---- end floating overlay chrome ---- */

@media (max-width: 520px) {
  .narrow-message {
    display: flex;
  }

  .app-shell {
    display: none;
  }
}

body.preview-embed .app-shell {
  display: block !important;
}

/* 3D curl-along-spine animation. Replaces the flat linear transition
   with @keyframes that vary perspective + translateZ + filter through
   the rotation, so the page reads as a flexible sheet curling around
   the spine instead of a rigid slab pivoting.

   Phase 1 (0->10%): subtle rotateX(-2deg) tilts the page forward as if
   the bottom corner is rising before the spine rotation begins. The
   closest CSS-only nod to a true Heyzine-style corner peel.

   Phase 2 (10->90%): main spine rotation with perspective tightening
   from 2800px -> 1500px and translateZ rising 8px -> 82px so the page
   genuinely lifts off the surface. The drop-shadow tracks laterally.

   Phase 3 (90->100%): opacity fades 1 -> 0 on the leaf so by the time
   the cleanup setTimeout removes it (1220ms), the leaf is already
   invisible. This is the robust gusset-flash fix -- regardless of any
   paint-timing race during cleanup, the leaf cannot show OLD page
   content because it is opacity:0. */

.flip-leaf.animating.forward {
  animation: page-curl-fwd 1200ms cubic-bezier(0.45, 0.05, 0.25, 1) forwards;
}

.flip-leaf.animating.backward {
  animation: page-curl-bwd 1200ms cubic-bezier(0.45, 0.05, 0.25, 1) forwards;
}

@keyframes page-curl-fwd {
  0% {
    transform: perspective(2800px) rotateY(0deg) translateZ(8px) rotateX(0deg);
    filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.28));
    opacity: 1;
  }
  10% {
    transform: perspective(2300px) rotateY(-8deg) translateZ(28px) rotateX(-2deg);
    filter: drop-shadow(6px 22px 32px rgba(0, 0, 0, 0.34));
    opacity: 1;
  }
  25% {
    transform: perspective(1900px) rotateY(-46deg) translateZ(56px) rotateX(-1.6deg);
    filter: drop-shadow(14px 26px 38px rgba(0, 0, 0, 0.42));
    opacity: 1;
  }
  50% {
    transform: perspective(1500px) rotateY(-90deg) translateZ(82px) rotateX(0deg);
    filter: drop-shadow(0 36px 50px rgba(0, 0, 0, 0.48));
    opacity: 1;
  }
  75% {
    transform: perspective(1900px) rotateY(-134deg) translateZ(56px) rotateX(1.6deg);
    filter: drop-shadow(-14px 26px 38px rgba(0, 0, 0, 0.42));
    opacity: 1;
  }
  92% {
    transform: perspective(2400px) rotateY(-160deg) translateZ(24px) rotateX(0.6deg);
    filter: drop-shadow(0 22px 32px rgba(0, 0, 0, 0.32));
    opacity: 1;
  }
  100% {
    transform: perspective(2800px) rotateY(-168deg) translateZ(18px) rotateX(0deg);
    filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.28));
    opacity: 0;
  }
}

@keyframes page-curl-bwd {
  0% {
    transform: perspective(2800px) rotateY(0deg) translateZ(8px) rotateX(0deg);
    filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.28));
    opacity: 1;
  }
  10% {
    transform: perspective(2300px) rotateY(8deg) translateZ(28px) rotateX(-2deg);
    filter: drop-shadow(-6px 22px 32px rgba(0, 0, 0, 0.34));
    opacity: 1;
  }
  25% {
    transform: perspective(1900px) rotateY(46deg) translateZ(56px) rotateX(-1.6deg);
    filter: drop-shadow(-14px 26px 38px rgba(0, 0, 0, 0.42));
    opacity: 1;
  }
  50% {
    transform: perspective(1500px) rotateY(90deg) translateZ(82px) rotateX(0deg);
    filter: drop-shadow(0 36px 50px rgba(0, 0, 0, 0.48));
    opacity: 1;
  }
  75% {
    transform: perspective(1900px) rotateY(134deg) translateZ(56px) rotateX(1.6deg);
    filter: drop-shadow(14px 26px 38px rgba(0, 0, 0, 0.42));
    opacity: 1;
  }
  92% {
    transform: perspective(2400px) rotateY(160deg) translateZ(24px) rotateX(0.6deg);
    filter: drop-shadow(0 22px 32px rgba(0, 0, 0, 0.32));
    opacity: 1;
  }
  100% {
    transform: perspective(2800px) rotateY(168deg) translateZ(18px) rotateX(0deg);
    filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.28));
    opacity: 0;
  }
}

.flip-leaf::before,
.flip-leaf::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 5;
}

.flip-leaf.forward::before,
.flip-leaf.backward::before {
  width: 52px;
  background: linear-gradient(90deg, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0.08), transparent);
}

.flip-leaf.forward::before {
  left: -4px;
}

.flip-leaf.backward::before {
  right: -4px;
  transform: scaleX(-1);
}

.flip-leaf::after {
  width: 18px;
  right: 0;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.12));

    0 12px 26px rgba(0, 0, 0, 0.16),
    inset 0 0 0 1px rgba(30, 37, 48, 0.08);
  border-radius: 8px;
}

.flip-face::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.flip-leaf.forward .flip-front::after,
.flip-leaf.backward .flip-back::after {
  background: linear-gradient(90deg, rgba(0, 0, 0, 0.18), transparent 18%, transparent 78%, rgba(0, 0, 0, 0.1));
}

.flip-leaf.forward .flip-back::after,
.flip-leaf.backward .flip-front::after {
  background: linear-gradient(90deg, rgba(255, 255, 255, 0.18), transparent 26%, transparent 82%, rgba(0, 0, 0, 0.16));
}

.flip-back {
  transform: rotateY(180deg);
}

.flip-face-content {
  width: 100%;
  height: 100%;
  transform-origin: center center;
}

.flip-leaf.forward .flip-front .flip-face-content {
  transform: skewY(-0.8deg) scaleX(1.02);
}

.flip-leaf.forward .flip-back .flip-face-content {
  transform: skewY(0.8deg) scaleX(1.02);
}

.flip-leaf.backward .flip-front .flip-face-content {
  transform: skewY(0.8deg) scaleX(1.02);
}

.flip-leaf.backward .flip-back .flip-face-content {
  transform: skewY(-0.8deg) scaleX(1.02);
}

.flip-face-content > .page {
  width: 100%;
  height: 100%;
}
</style>

  if (!entry || typeof entry !== "object") return "spread";

    return "Preaching professor and homiletician known for voice, embodiment, and the living tradition of proclamation in ministry.";
  }
  if (normalized.includes("add faculty")) {
    return "Add a short faculty blurb here.";
  }
  return "Add a short faculty blurb here.";
}

function getLeftBlockDefaults(kind, order = 0) {
  const defaults = {
    header: {
      xPercent: 0,
      yPercent: 63,
      widthPercent: 84,
      textAlign: "left",
      fontFamily: "louize-bold",
      fontSize: 28,
      lineHeight: 1.02
    },
    text: {
      xPercent: 0,
      yPercent: 73,
      widthPercent: 82,
      textAlign: "left",
      fontFamily: "montserrat",
      fontSize: 15,
      lineHeight: 1.58
    },
    quote: {
      xPercent: 0,
      yPercent: 93,
      widthPercent: 96,
      textAlign: "left",
      fontFamily: "louize-italic",
      fontSize: 16,
      lineHeight: 1.24
    }
  };
  const base = defaults[kind] || defaults.text;
  return {
    ...base,
    yPercent: Math.min(base.yPercent + Math.max(0, order - 2) * 3, 95)
  };
}

function normalizeLeftBlock(block, order = 0) {
  const nextBlock = block && typeof block === "object" ? { ...block } : {};
  const kind = nextBlock.kind || "text";
  const defaults = getLeftBlockDefaults(kind, order);
  return {
    kind,
    text: typeof nextBlock.text === "string" ? nextBlock.text : "",
    widthPercent: Math.max(20, Math.min(Number(nextBlock.widthPercent) || defaults.widthPercent, 100)),
    xPercent: Math.max(0, Math.min(Number(nextBlock.xPercent) || defaults.xPercent, 80)),
    yPercent: Math.max(0, Math.min(Number(nextBlock.yPercent) || defaults.yPercent, 95)),
    textAlign: nextBlock.textAlign || nextBlock.align || defaults.textAlign,
    align: nextBlock.align || nextBlock.textAlign || defaults.textAlign,
    fontFamily: nextBlock.fontFamily || defaults.fontFamily,
    fontSize: Math.max(8, Math.min(Number(nextBlock.fontSize) || defaults.fontSize, 72)),
    lineHeight: Math.max(0.8, Math.min(Number(nextBlock.lineHeight) || defaults.lineHeight, 2.4))
  };
}

function createDefaultLeftBlocks(entry) {
  const feature = entry && entry.feature ? entry.feature : {};
  return [
    normalizeLeftBlock({ kind: "header", text: feature.title || "" }, 0),
    normalizeLeftBlock({ kind: "text", text: feature.lede || "" }, 1),
    normalizeLeftBlock({ kind: "quote", text: feature.quote || "" }, 2)
  ].filter((block) => block.text.trim());
}

function normalizeContent(data) {
  return deepClone(data).map((entry, index, all) => {
    const nextEntry = entry && typeof entry === "object" ? entry : {};
    nextEntry.type = inferEntryType(nextEntry, index, all.length);
    if (nextEntry.type === "spread") {
      const templateVersion = Number(nextEntry.templateVersion) || 0;
      nextEntry.feature = {
        courseLabel: "Featured Course",
        headshot: getDefaultHeadshot(nextEntry.feature?.instructor || ""),
        facultyBlurb: getDefaultFacultyBlurb(nextEntry.feature?.instructor || ""),
        ...(nextEntry.feature || {})
      };
      nextEntry.supportTitle = nextEntry.supportTitle || "Also in this theme";
      nextEntry.layout = {
        ...createDefaultSpreadLayout(),
        ...(nextEntry.layout || {})
      };
      nextEntry.layout.imageScalePercent = Math.max(40, Math.min(Number(nextEntry.layout.imageScalePercent ?? nextEntry.layout.imageWidthPercent) || 84, 140));
      nextEntry.layout.imageY = Math.max(0, Math.min(Number(nextEntry.layout.imageY) || 10, 40));
      nextEntry.layout.genreY = Math.max(0, Math.min(Number(nextEntry.layout.genreY) || 4, 25));
      nextEntry.layout.genreFontSize = Math.max(10, Math.min(Number(nextEntry.layout.genreFontSize) || 24, 42));
      nextEntry.layout.genreWidthPercent = Math.max(24, Math.min(Number(nextEntry.layout.genreWidthPercent) || 72, 100));
      nextEntry.layout.courseLabelWidthPercent = Math.max(24, Math.min(Number(nextEntry.layout.courseLabelWidthPercent) || 52, 100));
      nextEntry.layout.facultyY = Math.max(60, Math.min(Number(nextEntry.layout.facultyY) || 82, 92));
      nextEntry.layout.facultyWidthPercent = Math.max(34, Math.min(Number(nextEntry.layout.facultyWidthPercent) || 84, 120));
      nextEntry.layout.rightHeadingWidthPercent = Math.max(35, Math.min(Number(nextEntry.layout.rightHeadingWidthPercent) || 82, 100));
      nextEntry.layout.rightIntroWidthPercent = Math.max(35, Math.min(Number(nextEntry.layout.rightIntroWidthPercent) || 84, 100));
      nextEntry.layout.rightListWidthPercent = Math.max(50, Math.min(Number(nextEntry.layout.rightListWidthPercent) || 100, 100));
      // Description + instructor card position/height knobs (new layout slots).
      // Use Number.isFinite(...) so a legitimate 0 isn't reset by `||` falling back to a default.
      const _clampSigned = (n, min, max, dflt) => { const v = Number(n); return Number.isFinite(v) ? Math.max(min, Math.min(v, max)) : dflt; };
      nextEntry.layout.descriptionX = _clampSigned(nextEntry.layout.descriptionX, -20, 20, 0);
      nextEntry.layout.descriptionY = _clampSigned(nextEntry.layout.descriptionY, -20, 20, 0);
      nextEntry.layout.descriptionHeight = _clampSigned(nextEntry.layout.descriptionHeight, 0, 400, 0);
      nextEntry.layout.instructorCardX = _clampSigned(nextEntry.layout.instructorCardX, -20, 20, 0);
      nextEntry.layout.instructorCardY = _clampSigned(nextEntry.layout.instructorCardY, -20, 20, 0);
      nextEntry.layout.instructorCardWidth = _clampSigned(nextEntry.layout.instructorCardWidth, 80, 300, 200);
      nextEntry.layout.instructorCardHeight = _clampSigned(nextEntry.layout.instructorCardHeight, 0, 400, 0);
      nextEntry.layout.imageOffsetY = _clampSigned(nextEntry.layout.imageOffsetY, -20, 20, 0);
      nextEntry.layout.descriptionWidthPercent = _clampSigned(nextEntry.layout.descriptionWidthPercent, 50, 100, 100);
      nextEntry.layout.descriptionFontSize = _clampSigned(nextEntry.layout.descriptionFontSize, 12, 28, 14);
      nextEntry.layout.descriptionTitleFontSize = _clampSigned(nextEntry.layout.descriptionTitleFontSize, 24, 60, 24);
      nextEntry.layout.cardGapPx = _clampSigned(nextEntry.layout.cardGapPx, 8, 80, 24);
      nextEntry.leftBlocks = templateVersion >= getSpreadTemplateVersion() && Array.isArray(nextEntry.leftBlocks) && nextEntry.leftBlocks.length
        ? nextEntry.leftBlocks
            .map((block, blockIndex) => normalizeLeftBlock(block, blockIndex))
            .filter((block) => block.kind !== "meta" && block.text.trim())
        : createDefaultLeftBlocks(nextEntry);
      nextEntry.templateVersion = getSpreadTemplateVersion();
    }
    return nextEntry;
  });
}

function buildBlockTextPool(entry) {
  const pool = { header: [], text: [], quote: [] };
  (Array.isArray(entry.leftBlocks) ? entry.leftBlocks : []).forEach((block) => {
    if (pool[block.kind]) {
      pool[block.kind].push(block.text || "");
    }
  });
  if (!pool.header.length && entry.feature?.title) pool.header.push(entry.feature.title);
  if (!pool.text.length && entry.feature?.lede) pool.text.push(entry.feature.lede);
  if (!pool.quote.length && entry.feature?.quote) pool.quote.push(entry.feature.quote);
  return pool;
}

function takeTemplateText(kind, pool, entry) {
  if (pool[kind] && pool[kind].length) {
    return pool[kind].shift() || "";
  }
  if (kind === "header") return entry.feature?.title || "";
  if (kind === "text") return entry.feature?.lede || "";
  if (kind === "quote") return entry.feature?.quote || "";
  return "";
}

function applyMasterSpreadTemplate(data) {
  const spreadEntries = data
    .map((entry, index) => ({ entry, index }))
    .filter(({ entry }) => entry.type === "spread");

  if (!spreadEntries.length) return data;
  const masterEntry = spreadEntries[0].entry;
  const masterLayout = {
    ...createDefaultSpreadLayout(),
    ...(masterEntry.layout || {})
  };
  const masterBlocks = Array.isArray(masterEntry.leftBlocks) && masterEntry.leftBlocks.length
    ? masterEntry.leftBlocks.map((block, index) => normalizeLeftBlock(block, index))
    : createDefaultLeftBlocks(masterEntry);

  spreadEntries.forEach(({ entry }, spreadOrder) => {
    // Each spread's own supportTitle wins over the master template's,
    // so the right-page heading reflects the spread's category
    // (e.g., "Other Old Testament Courses") rather than always inheriting
    // the first spread's heading.
    entry.supportTitle = entry.supportTitle || masterEntry.supportTitle || "Also in this theme";
    entry.layout = {
      // Master spread is the single source of truth for layout. Each
      // category spread inherits the master's layout values so all
      // 7 spreads remain visually identical -- edit one, update all.
      ...(entry.layout || {}),
      ...masterLayout
    };
    entry.feature = {
      ...(entry.feature || {}),
      courseLabel: masterEntry.feature?.courseLabel || entry.feature?.courseLabel || "Featured Course"
    };
    if (spreadOrder > 0) {
      const pool = buildBlockTextPool(entry);
      entry.leftBlocks = masterBlocks.map((templateBlock, blockIndex) => normalizeLeftBlock({
        ...templateBlock,
        text: takeTemplateText(templateBlock.kind, pool, entry)
      }, blockIndex));
    } else {
      entry.leftBlocks = masterBlocks.map((block, blockIndex) => normalizeLeftBlock(block, blockIndex));
    }
  });

  return data;
}

function loadBookData() {
  try {
    const saved = localStorage.getItem(CONTENT_STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length) {
        return applyMasterSpreadTemplate(normalizeContent(parsed));
      }
    }
  } catch (error) {}
  return Array.isArray(window.FLIPBOOK_CONTENT) ? applyMasterSpreadTemplate(normalizeContent(window.FLIPBOOK_CONTENT)) : [];
}

function updatePreviewScale() {
  if (!isPreviewEmbed) return;
  const widthScale = window.innerWidth / 1540;
  const heightScale = window.innerHeight / 980;
  const scale = Math.min(widthScale, heightScale, 1);
  document.documentElement.style.setProperty("--preview-scale", String(scale));
}


function updateBookScale() {
  const stage = document.getElementById("book-stage");
  if (!stage) return;
  // offsetWidth/offsetHeight return the layout (un-transformed) box size, so
  // this works correctly in the editor preview iframe where an ancestor has
  // its own transform: scale().
  const w = stage.offsetWidth;
  const h = stage.offsetHeight;
  if (w === 0 || h === 0) return;
  // Design size: 1500 x 780. Allow scaling up beyond 1.0 so the book fills
  // bigger monitors. Pick the dimension that fits and respect aspect.
  const scale = Math.min(w / 1500, h / 780);
  document.documentElement.style.setProperty("--book-scale", String(scale));
}

window.addEventListener("resize", updateBookScale);
if (typeof ResizeObserver !== "undefined") {
  const _stageEl = document.getElementById("book-stage");
  if (_stageEl) new ResizeObserver(updateBookScale).observe(_stageEl);
}

function renderNote(index) {
  const entry = BOOK[index];
  const points = Array.isArray(entry.points) ? entry.points : [];
  // Pull TOC from the spread entries so it stays in sync with the deck.
  const tocItems = getCoursePages();
  const renderPoint = (point) => {
    const priceBlock = (point.price)
      ? `<div class="point-price"><span class="price-num">${point.price}</span>${point.priceUnit ? `<span class="price-unit">${point.priceUnit}</span>` : ""}</div>`
      : "";
    const tagBlock = point.tag ? `<span class="point-tag">${point.tag}</span>` : "";
    const copy = point.copy ? `<p class="point-copy">${point.copy}</p>` : "";
    return `<article class="note-point">${tagBlock}<strong>${point.title || ""}</strong>${copy}${priceBlock}</article>`;
  };
  return `
    <div class="page page-left note-left">
      <div class="note-banner">
        ${(entry.title || entry.bannerAccent) ? `<h1 class="note-banner-title">${entry.title ? `<span class="note-banner-title-static">${entry.title}</span>` : ""}${entry.bannerAccent ? `<span class="note-banner-title-anim">${entry.bannerAccent}</span>` : ""}</h1>` : ""}
      </div>

      <h2 class="note-title">${entry.title || ""}</h2>

      <div class="eyebrow note-kicker">${entry.rightEyebrow || ""}</div>
      <h3 class="toc-heading">${entry.tocTitle || "Course Topics"}</h3>
      <div class="toc-list">
        ${tocItems.map(({ entry: tocEntry, index: tocIndex }, itemIndex) => `<button class="toc-item" type="button" data-target-index="${tocIndex}"><span class="toc-num">${String(itemIndex + 1).padStart(2, "0")}</span>${tocEntry.label || tocEntry.genre || `Category ${itemIndex + 1}`}</button>`).join("")}
      </div>

}

function renderSupportItem(item, itemIndex, spreadIndex) {
  const itemId = `support-${spreadIndex}-${itemIndex}`;

  const panelHeight = "";
