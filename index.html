function getImageShadow(value) {
  if (value === "none") return "none";
  // Ambient occlusion + mid shadow stack so the course image feels placed on the page,
  // not pasted onto it. Two layered drop-shadows mimic a close-contact plus a diffuse ambient.
  if (value === "strong") return "drop-shadow(0 28px 44px rgba(30, 37, 48, 0.30)) drop-shadow(0 8px 14px rgba(30, 37, 48, 0.14))";
  return "drop-shadow(0 20px 32px rgba(30, 37, 48, 0.20)) drop-shadow(0 6px 10px rgba(30, 37, 48, 0.10))";
}

function getEditorFontFamily(value, fallbackKind = "text") {
  if (value === "louize") return "'Louize', 'DM Serif Display', serif";
  if (value === "louize-italic") return "'Louize Italic', 'Louize', 'DM Serif Display', serif";
  if (value === "louize-bold") return "'Louize Bold', 'Louize', 'DM Serif Display', serif";
  if (value === "montserrat") return "'Montserrat', 'DM Sans', sans-serif";
  if (value === "serif") return "'DM Serif Display', serif";
  if (value === "mono") return "'DM Mono', monospace";
  if (value === "sans") return "'DM Sans', sans-serif";
  return fallbackKind === "header" || fallbackKind === "quote"
    ? "'Louize', 'DM Serif Display', serif"
    : fallbackKind === "meta"
      ? "'DM Mono', monospace"
      : "'Montserrat', 'DM Sans', sans-serif";
}

function renderLeftBlock(block) {
  const normalized = normalizeLeftBlock(block);
  const kind = normalized.kind || "text";
  if (!normalized.text.trim()) return "";
  const className = {
    header: "feature-block feature-block-header",
    quote: "feature-block feature-block-quote",
    text: "feature-block feature-block-text"
  }[kind] || "feature-block feature-block-text";
  const tagName = kind === "quote" ? "blockquote" : kind === "header" ? "h2" : "p";
  return `<${tagName} class="${className}" style="--block-x:${normalized.xPercent}; --block-y:${normalized.yPercent}; --block-width:${normalized.widthPercent}; --block-text-align:${normalized.textAlign || "left"}; --block-font-family:${getEditorFontFamily(normalized.fontFamily, kind)}; --block-font-size:${normalized.fontSize}px; --block-line-height:${normalized.lineHeight};">${normalized.text || ""}</${tagName}>`;
}

function renderFacultyCard(entry) {
  const feature = entry.feature || {};
  if (!feature.instructor && !feature.facultyBlurb && !feature.headshot && !feature.facultyBio) return "";
  const scalePercent = Math.max(60, Math.min(Number(entry.layout?.facultyScalePercent) || 100, 140));
  const scale = scalePercent / 100;
  const facultyWidth = Math.max(34, Math.min(Number(entry.layout?.facultyWidthPercent) || 84, 120));
  const avatarSize = Number(entry.layout?.facultyAvatarSizePx) || Math.round(130 * scale);
  const nameSize = Number(entry.layout?.facultyNameSizePx) || Math.round(15 * scale);
  const blurbSize = Number(entry.layout?.facultyBlurbSizePx) || Math.round(12 * scale);
  const bioSize = Math.round(12 * scale);
  const cardHeight = Math.round(190 * scale);

  const resolvedHeadshot = feature.headshot || getDefaultHeadshot(feature.instructor || "");
  const avatarInner = resolvedHeadshot
    ? `<img src="${resolvedHeadshot}" alt="${feature.instructor || "Faculty headshot"}">`
    : `<img src="assets/branding/foundry-logomark-orange.png" alt="" aria-hidden="true">`;
  const avatarClass = resolvedHeadshot ? "faculty-avatar-large" : "faculty-avatar-large faculty-card-mark";

  const blurbText = feature.facultyBlurb || "";
  const bioText = feature.facultyBio || "";
  const firstName = (feature.instructor || "").replace(/^Dr\.?\s+/i, "").split(/\s+/)[0] || "this instructor";
  const backKicker = `About ${firstName}`;

  const showBack = bioText.trim().length > 0;
  const flipHintFront = showBack ? `<span class="faculty-flip-hint">Tap for bio <span class="flip-arrow" aria-hidden="true">↻</span></span>` : "";
  const backFace = showBack
    ? `<div class="faculty-card-face faculty-card-back">
         <span class="faculty-kicker">${backKicker}</span>
         <p class="faculty-bio">${bioText}</p>
         <span class="faculty-flip-hint">Back to front <span class="flip-arrow" aria-hidden="true">↺</span></span>
       </div>`
    : "";

  const cssVars = [
    `--faculty-y:${Math.max(60, Math.min(Number(entry.layout?.facultyY) || 82, 92))}`,
    `--faculty-width:${facultyWidth}%`,
    `--faculty-avatar-size:${avatarSize}`,
    `--faculty-name-size:${nameSize}`,
    `--faculty-blurb-size:${blurbSize}`,
    `--faculty-bio-size:${bioSize}`,
    `--faculty-card-height:${cardHeight}`
  ].join("; ");

  // Option-2 compact instructor card. The wrapper (.faculty-card-slot) and
  // the flip mechanics (.faculty-card, .faculty-card-inner, .faculty-card-face,
  // is-flipped class via JS) are preserved -- only the FRONT face is restyled.
  // The back face stays the existing bio panel.
  const frontInner = resolvedHeadshot
    ? `<img class="featured-instructor-avatar" src="${resolvedHeadshot}" alt="${feature.instructor || "Instructor headshot"}">`
    : `<span class="featured-instructor-avatar is-fallback" aria-hidden="true"><img src="assets/branding/foundry-logomark-orange.png" alt=""></span>`;
  const bioLinkText = showBack ? "Tap for Bio ↻" : "";
  return `
    <div class="faculty-card-slot featured-instructor-slot">
      <button class="faculty-card featured-instructor-card" type="button" aria-pressed="false"${showBack ? ' aria-label="Tap to see instructor bio"' : ""}>
        <div class="faculty-card-inner">
          <div class="faculty-card-face faculty-card-front featured-instructor-front">
            ${frontInner}
            <div class="featured-instructor-label">Instructor</div>
            <div class="featured-instructor-name">${feature.instructor || ""}</div>
            ${bioLinkText ? `<div class="featured-instructor-bio-link">${bioLinkText}</div>` : ""}
          </div>
          ${backFace}
        </div>
      </button>
    </div>
  `;
}

function getImageShadowFilter(shadow) {
  switch (shadow) {
    case "none":
      return "none";
    case "strong":
      return "drop-shadow(0 18px 28px rgba(30, 37, 48, 0.32))";
    case "soft":
    default:
      return "drop-shadow(0 12px 18px rgba(30, 37, 48, 0.16))";
  }
}

function renderSpread(entry, index) {
  const layout = {
    ...createDefaultSpreadLayout(),
    ...(entry.layout || {})
  };
  const feature = entry.feature || {};
  const blocks = Array.isArray(entry.leftBlocks) && entry.leftBlocks.length
    ? entry.leftBlocks.map((block, blockIndex) => normalizeLeftBlock(block, blockIndex))
    : createDefaultLeftBlocks(entry);
  const imageScale = Math.max(40, Math.min(Number(layout.imageScalePercent ?? layout.imageWidthPercent) || 84, 140));
  const imageY = Math.max(0, Math.min(Number(layout.imageY) || 10, 40));
  const genreY = Math.max(0, Math.min(Number(layout.genreY) || 4, 25));
  const genreFontSize = Math.max(10, Math.min(Number(layout.genreFontSize) || 24, 42));
  const genreWidth = Math.max(24, Math.min(Number(layout.genreWidthPercent) || 72, 100));
  const courseLabelY = Math.max(3, Math.min(Number(layout.courseLabelY) || 9, 78));
  const courseLabelFontSize = Math.max(10, Math.min(Number(layout.courseLabelFontSize) || 12, 28));
  const courseLabelWidth = Math.max(24, Math.min(Number(layout.courseLabelWidthPercent) || 52, 100));
  const rightHeadingWidth = Math.max(35, Math.min(Number(layout.rightHeadingWidthPercent) || 82, 100));
  const rightIntroWidth = Math.max(35, Math.min(Number(layout.rightIntroWidthPercent) || 84, 100));
  const rightListWidth = Math.max(50, Math.min(Number(layout.rightListWidthPercent) || 100, 100));
  const rightAvatarSize = Math.max(28, Math.min(Number(layout.rightCardAvatarSizePx) || 52, 96));
  const facultyAvatarSize = Math.max(36, Math.min(Number(layout.facultyAvatarSizePx) || 56, 200));
  const facultyNameSize = Math.max(11, Math.min(Number(layout.facultyNameSizePx) || 13, 24));
  const facultyBlurbSize = Math.max(8, Math.min(Number(layout.facultyBlurbSizePx) || 9, 18));
  // New layout-slot knobs. Number.isFinite preserves legitimate 0 (no offset / no min-height).
  const _toNum = (v, dflt) => { const n = Number(v); return Number.isFinite(n) ? n : dflt; };
  const descriptionX = Math.max(-20, Math.min(_toNum(layout.descriptionX, 0), 20));
  const descriptionY = Math.max(-20, Math.min(_toNum(layout.descriptionY, 0), 20));
  const descriptionHeight = Math.max(0, Math.min(_toNum(layout.descriptionHeight, 0), 400));
  const descriptionHeightCss = descriptionHeight > 0 ? `${descriptionHeight}px` : "auto";
  const descriptionAlign = descriptionHeight > 0 ? "start" : "stretch";
  const instructorCardX = Math.max(-20, Math.min(_toNum(layout.instructorCardX, 0), 20));
  const instructorCardY = Math.max(-20, Math.min(_toNum(layout.instructorCardY, 0), 20));
  const instructorCardWidth = Math.max(80, Math.min(_toNum(layout.instructorCardWidth, 200), 300));
  const instructorCardHeight = Math.max(0, Math.min(_toNum(layout.instructorCardHeight, 0), 400));
  const instructorCardHeightCss = instructorCardHeight > 0 ? `${instructorCardHeight}px` : "100%";
  const instructorCardAlign = instructorCardHeight > 0 ? "start" : "stretch";
  // New layout knobs (Q2 2026): graphic Y, description width/font/title-font, faculty-card gap.
  const imageOffsetY = Math.max(-20, Math.min(_toNum(layout.imageOffsetY, 0), 20));
  const descriptionWidth = Math.max(50, Math.min(_toNum(layout.descriptionWidthPercent, 100), 100));
  const descriptionFontSize = Math.max(12, Math.min(_toNum(layout.descriptionFontSize, 14), 28));
  const descriptionTitleFontSize = Math.max(24, Math.min(_toNum(layout.descriptionTitleFontSize, 24), 60));
  const cardGapPx = Math.max(8, Math.min(_toNum(layout.cardGapPx, 24), 80));
  const descriptionJustify = descriptionHeight > 0 ? "flex-start" : "center";
  const supporting = Array.isArray(entry.supporting) ? entry.supporting : [];
  return `
    <div class="page page-left feature-left" style="--image-scale:${imageScale}; --image-shadow:${getImageShadowFilter(layout.imageShadow)}; --course-label-font-size:${courseLabelFontSize}; --faculty-avatar-size:${facultyAvatarSize}; --faculty-name-size:${facultyNameSize}; --faculty-blurb-size:${facultyBlurbSize}; --description-x:${descriptionX}; --description-y:${descriptionY}; --description-height-css:${descriptionHeightCss}; --description-align:${descriptionAlign}; --description-justify:${descriptionJustify}; --description-width-css:${descriptionWidth}%; --description-font-size:${descriptionFontSize}px; --description-title-font-size:${descriptionTitleFontSize}px; --card-gap:${cardGapPx}px; --image-offset-y:${imageOffsetY}; --instructor-card-x:${instructorCardX}; --instructor-card-y:${instructorCardY}; --instructor-card-width:${instructorCardWidth}; --instructor-card-height-css:${instructorCardHeightCss}; --instructor-card-align:${instructorCardAlign};">
      <div class="feature-canvas">
        <div class="feature-genre" style="--genre-font-size:${genreFontSize}px; --genre-font-family:${getEditorFontFamily(layout.genreFontFamily || "montserrat", "text")};">${entry.genre}</div>
        <span class="featured-eyebrow">★ ${feature.courseLabel || "Featured Course"}</span>
        ${feature.image ? `<div class="featured-hero"><img src="${feature.image}" alt="${feature.title || entry.label || entry.genre || ""}"></div>` : `<div class="featured-hero" aria-hidden="true"></div>`}
        <div class="featured-bottom">
          <div class="featured-text-block">
            <h2 class="featured-title">${feature.title || ""}</h2>
            <p class="featured-desc">${feature.lede || ""}</p>
          </div>
          ${renderFacultyCard(entry)}
        </div>
        <div class="paper-grain"></div>
      </div>
    </div>
    <div class="page page-right feature-right" style="--right-heading-size:${Math.max(24, Math.min(Number(layout.rightHeadingFontSize) || 44, 58))}px; --right-heading-width:${rightHeadingWidth}; --right-intro-size:${Math.max(12, Math.min(Number(layout.rightIntroFontSize) || 16, 24))}px; --right-intro-width:${rightIntroWidth}; --right-card-title-size:${Math.max(12, Math.min(Number(layout.rightCardTitleFontSize) || 16, 30))}px; --right-card-meta-size:${Math.max(9, Math.min(Number(layout.rightCardMetaFontSize) || 11, 18))}px; --right-card-summary-size:${Math.max(11, Math.min(Number(layout.rightCardSummaryFontSize) || 14, 22))}px; --support-avatar-size:${rightAvatarSize}; --right-list-width:${rightListWidth};">
      <div class="section-genre">${entry.genre || ""}</div>

      ${entry.intro ? `<p class="support-intro">${entry.intro}</p>` : ""}
      <div class="support-list">${supporting.map((item, i) => renderSupportItem(item, i, index)).join("")}</div>
      <div class="paper-grain"></div>
    </div>
  `;
}

function renderClose(index) {
  const entry = BOOK[index];
  // Back cover (May 2026 v4 — single-page audience grid). Same
  // single-page treatment as the front cover so showCover:true makes
  // the closed-book back read as a real magazine back cover. The
  // photo (Master Class Student Talking 5) sits as a soft cream-washed
  // watermark behind the audience grid — same tonal language as the
  // front cover.
  const cells = Array.isArray(entry.cells) ? entry.cells : [];
  const renderCell = (cell) => {
    const eyebrow = cell.eyebrow || "";
    const ctitle = cell.title || "";
    const copy = cell.copy || "";
    const url = cell.linkUrl || "";
    const linkLabel = cell.linkLabel || "Open \u2192";
    const featured = cell.featured ? " close-c-cell-featured" : "";
    const isExternal = url && !url.startsWith("mailto:") && !url.startsWith("#");
    const linkAttrs = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
    const linkEl = url
      ? `<a class="close-c-link" href="${url}"${linkAttrs}>${linkLabel}</a>`
      : "";
    return `
      <article class="close-c-cell${featured}">
        ${eyebrow ? `<div class="close-c-cell-eyebrow">${eyebrow}</div>` : ""}
        ${ctitle ? `<h3 class="close-c-cell-title">${ctitle}</h3>` : ""}
        ${copy ? `<p class="close-c-cell-copy">${copy}</p>` : ""}
        ${linkEl}
      </article>
    `;
  };
  return `
    <div class="page close-c-single">
      <div class="close-c-photo" aria-hidden="true"></div>
      <div class="close-c-shade" aria-hidden="true"></div>
      <div class="close-c-content">
        <img class="close-c-logo" src="assets/branding/foundry-logo-orange.png" alt="The Candler Foundry">
        ${entry.title ? `<h2 class="close-c-title">${entry.title}</h2>` : ""}
        ${entry.subtitle ? `<p class="close-c-subtitle">${entry.subtitle}</p>` : ""}
        <div class="close-c-grid">
          ${cells.map(renderCell).join("")}
        </div>
        <div class="close-c-meta">
          ${entry.metaLeft ? `<span>${entry.metaLeft}</span>` : ""}
          ${entry.metaRight ? `<span>${entry.metaRight}</span>` : ""}
        </div>
      </div>
      <div class="paper-grain"></div>
    </div>
  `;
}

function renderEntry(entry, index) {
  if (entry.type === "cover") return renderCover(index);
  if (entry.type === "note") return renderNote(index);
  if (entry.type === "close") return renderClose(index);
  return renderSpread(entry, index);
}

// ---- StPageFlip integration ----
//
// pageFlipInstance is the active library instance, or null if we're using
// the legacy renderer (preview-embed mode, or library failed to load).
let pageFlipInstance = null;

function buildBookPageFlip() {
  // Replace the book-stage's contents with a fresh container the library
  // can take over. Generate one .spf-page wrapper per page (each entry
  // produces 2 pages: left and right).
  bookStage.innerHTML = '<div id="pageflip-book"></div>';
  const container = document.getElementById('pageflip-book');

  const tempWrapper = document.createElement('div');
  const pageEls = [];
  // Per-page entry mapping: pageToEntry[pageIndex] -> entry index, and
  // entryFirstPage[entryIndex] -> first pageIndex for that entry.
  // These let entries emit either 1 or 2 .page elements (1 for cover
  // and back-cover singles, 2 for normal spreads) without breaking the
  // onFlip / goTo math.
  const pageToEntry = [];
  const entryFirstPage = [];
  BOOK.forEach((entry, index) => {
    entryFirstPage[index] = pageEls.length;
    tempWrapper.innerHTML = renderEntry(entry, index);
    const leftPage = tempWrapper.querySelector('.page-left');
    const rightPage = tempWrapper.querySelector('.page-right');
    if (leftPage && rightPage) {
      const lw = document.createElement('div');
      lw.className = 'spf-page';
      lw.dataset.entryIndex = String(index);
      lw.dataset.side = 'left';
      // .spf-page-clip is the layer that actually clips and supplies the
      // opaque ivory base. The library will add transform-style:
      // preserve-3d to .spf-page (via .stf__item) at runtime; we keep the
      // clip layer flat so overflow:hidden actually works.
      const lc = document.createElement('div');
      lc.className = 'spf-page-clip';
      lc.appendChild(leftPage);
      lw.appendChild(lc);
      pageEls.push(lw);
      pageToEntry.push(index);
      const rw = document.createElement('div');
      rw.className = 'spf-page';
      rw.dataset.entryIndex = String(index);
      rw.dataset.side = 'right';
      const rc = document.createElement('div');
      rc.className = 'spf-page-clip';
      rc.appendChild(rightPage);
      rw.appendChild(rc);
      pageEls.push(rw);
      pageToEntry.push(index);
    } else {
      // Single-page entry (cover / back cover). Emits ONE .page that
      // becomes the closed-magazine cover or back when paired with
      // showCover:true.
      const singlePage = tempWrapper.querySelector('.page');
      if (singlePage) {
        const sw = document.createElement('div');
        sw.className = 'spf-page';
        sw.dataset.entryIndex = String(index);
        sw.dataset.side = 'single';
        const sc = document.createElement('div');
        sc.className = 'spf-page-clip';
        sc.appendChild(singlePage);
        sw.appendChild(sc);
        pageEls.push(sw);
        pageToEntry.push(index);
      }
    }
    tempWrapper.innerHTML = '';
  });
  pageEls.forEach((p) => container.appendChild(p));
  // Stash maps on the function object so the flip-handler and goTo()
  // can read them without us threading them through closures.
  buildBookPageFlip._pageToEntry = pageToEntry;
  buildBookPageFlip._entryFirstPage = entryFirstPage;

  // Compute per-page dimensions from the current bookStage size.
  // Use offsetWidth/offsetHeight (layout box, not rendered box) so this
  // works correctly even inside the editor preview iframe, where an ancestor
  // transform:scale() would cause getBoundingClientRect() to return the
  // already-scaled size and double-shrink the content.
  const stageW = bookStage.offsetWidth;
  const stageH = bookStage.offsetHeight;
  const SPREAD_ASPECT = 1500 / 780;
  let bookW, bookH;
  if (stageW / stageH > SPREAD_ASPECT) {
    // Container wider than spread aspect -- bound by height
    bookH = Math.max(200, Math.floor(stageH));
    bookW = Math.floor(bookH * SPREAD_ASPECT);
  } else {
    // Container narrower -- bound by width
    bookW = Math.max(400, Math.floor(stageW));
    bookH = Math.floor(bookW / SPREAD_ASPECT);
  }
  const pageWidth = Math.floor(bookW / 2);
  const pageHeight = bookH;

  if (pageFlipInstance) {
    try { pageFlipInstance.destroy(); } catch (_) {}
    pageFlipInstance = null;
  }
  pageFlipInstance = new St.PageFlip(container, {
    width: pageWidth,
    height: pageHeight,
    size: 'fixed',
    autoSize: false,
    drawShadow: true,
    flippingTime: 950,
    showCover: true,
    usePortrait: false,
    mobileScrollSupport: true,
    swipeDistance: 30,
    clickEventForward: true,
    /* Page turns are initiated only by the arrow buttons (#prev-button /
       #next-button) and the keyboard handler (ArrowLeft / ArrowRight,
       PageUp / PageDown, Home / End) -- both call into the PageFlip API
       directly via `goTo(...)`. We turn off the library's own mouse
       handlers so:
         * hovering near a page corner doesn't trigger StPageFlip's
           `showCorner` fold preview (which was rendering the active page
           semi-transparent and showing a phantom curled corner at the
           bottom of the screen),
         * hovering near the right-page top corner doesn't race with the
           supporting card "+" toggle (the most common false flip on the
           old configuration),
         * click-and-drag through page text doesn't get hijacked into a
           fold gesture, so text-selection highlights don't streak across
           the spread.
       Inner buttons (faculty card 'Tap for bio', accordion toggles, TOC
       links) still work because they're handled by ordinary DOM event
       listeners we attach in attachAccordionBehavior / attachFacultyCardBehavior
       / attachTocBehavior. */
    useMouseEvents: false,
    showPageCorners: false,
    maxShadowOpacity: 0.5,
    startPage: Math.max(0, (buildBookPageFlip._entryFirstPage && buildBookPageFlip._entryFirstPage[currentIndex]) || 0),
  });

  pageFlipInstance.loadFromHTML(container.querySelectorAll('.spf-page'));

  // -- Override StPageFlip's hard-density-on-cover behavior. With
  // showCover:true the library calls setDensity("hard") on the first
  // page (and on the last page too if pageCount makes it a single
  // back-cover spread). That makes the cover and back-cover flip
  // stiffly like a hardcover book. We want them to curl like the
  // rest of the pages, so reach into the page collection right after
  // loadFromHTML and force soft density on the cover and back.
  try {
    const _pageCol = pageFlipInstance.getPageCollection && pageFlipInstance.getPageCollection();
    if (_pageCol && Array.isArray(_pageCol.pages)) {
      const _pgs = _pageCol.pages;
      if (_pgs.length > 0 && typeof _pgs[0].setDensity === 'function') _pgs[0].setDensity('soft');
      if (_pgs.length > 1 && typeof _pgs[_pgs.length - 1].setDensity === 'function') _pgs[_pgs.length - 1].setDensity('soft');
    }
  } catch (_) { /* if the internal API ever changes, fall back to default behavior */ }


  // Scale the fixed design-size (750×780) .page content to exactly fill its
  // wrapper, which the library sized to pageWidth×pageHeight. Without this
  // the content stays at design pixels: too large on small screens (clipped)
  // or too small on large screens (L-shaped dead space at bottom-right).
  // querySelectorAll is used broadly to catch any nodes the library cloned.
  const contentScale = pageWidth / 750;
  // Selector covers both the fresh structure (.spf-page > .spf-page-clip > .page)
  // and any clones the library may produce; the descendant combinator matches
  // either depth.
  bookStage.querySelectorAll('.spf-page .page').forEach(p => {
    p.style.transform = `scale(${contentScale})`;
  });

  // Inner-button listeners must be attached AFTER loadFromHTML because
  // the library may clone/move page nodes during init.
  attachAccordionBehavior();
  attachFacultyCardBehavior();
  attachTocBehavior();

  // Add the center-gutter shadow overlay inside .stf__block -- the element
  // the library creates inside #pageflip-book to hold all page nodes.
  // .stf__block has perspective:2000px which makes it a stacking context;
  // z-index:2 inside that context sits above static pages (z-index 1 from
  // simpleDraw) while staying below every animated element the library
  // raises during a flip: bottom-page z-index 3, flipping-page z-index 5,
  // inner/outer shadows z-index 4-10.
  //
  // If the gutter were a sibling of .stf__wrapper (i.e. a direct child of
  // #pageflip-book/.stf__parent), it would be in .stf__parent's stacking
  // context at z-index 2 AFTER all z-index:auto children (.stf__wrapper has
  // no z-index), permanently painting over every page and every flip
  // animation regardless of the z-index values the library sets internally.
  // That caused both the visible gusset-over-turning-page artifact and the
  // "translucent" backward-flip appearance (the backward flip starts at the
  // spine, directly under the gutter).
  const stfBlock = container.querySelector('.stf__block');
  const gutterHost = stfBlock || container;
  if (!gutterHost.querySelector('.book-gutter-overlay')) {
    const gutter = document.createElement('div');
    gutter.className = 'book-gutter-overlay';
    gutter.setAttribute('aria-hidden', 'true');
    gutterHost.appendChild(gutter);
  }

  // Resize handling via ResizeObserver on bookStage. Triggers a full
  // destroy + rebuild whenever the stage changes size by more than a
  // few pixels. ResizeObserver is more reliable than window.resize:
  // it fires on container changes (devtools open, editor preview
  // resize, monitor switch) not just window resize.
  if (!buildBookPageFlip._resizeObserver) {
    let resizeTimer = null;
    let lastW = 0, lastH = 0;
    const observer = new ResizeObserver((entries) => {
      if (!pageFlipInstance) return;
      const entry = entries[0];
      const w = entry.contentRect.width;
      const h = entry.contentRect.height;
      // Ignore micro-changes that would just thrash. Threshold ~6px.
      if (Math.abs(w - lastW) < 6 && Math.abs(h - lastH) < 6) return;
      lastW = w;
      lastH = h;
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (!pageFlipInstance) return;
        const savedIndex = currentIndex;
        try { pageFlipInstance.destroy(); } catch (_) {}
        pageFlipInstance = null;
        // Re-render the book with new computed dimensions.
        buildBookPageFlip();
        currentIndex = savedIndex;
        updateBook(false);
      }, 180);
    });
    observer.observe(bookStage);
    buildBookPageFlip._resizeObserver = observer;
  }

  // ---- Backward-flip paint-order fix --------------------------------
  //
  // StPageFlip v2.0.7 puts every page into a 3D rendering context:
  // .stf__block has `perspective: 2000px`, every .stf__item carries
  // `transform-style: preserve-3d`. Inside that context Chromium
  // ignores `z-index` and DOM order for sibling stacking; siblings end
  // up painted by some compositor-layer ordering that doesn't match
  // either authoring signal.
  //
  // Forward flips happen to look correct because of how the active
  // pages (bottomPage in the right slot, flippingPage rotating in
  // from the corner) interact with the static current spread on the
  // left -- no visible occlusion conflict.
  //
  // Backward flips put the active pages (bottomPage = previous spread's
  // left page; flippingPage = previous spread's right page) at the
  // SAME slot positions as the static current spread, so the current
  // spread paints over them. The user sees the current page bleeding
  // through the new page that's supposed to be revealed under the peel.
  // The visual was the New-Testament/Hebrew-Insights case in the field
  // report.
  //
  // Approach taken: rather than fight the 3D context, just hide the
  // current spread's static pages (`--simple` + display:block) for
  // the duration of any flip whose active pages sit EARLIER in DOM than
  // the current spread (i.e., a backward flip). For backward flips this
  // makes the active flip pages the only thing rendered in the spread
  // area, which matches what the user expects to see.
  //
  // The hide is applied via a CSS class (.spfg-flip-hide) rather than
  // inline opacity because the library's `simpleDraw` rewrites
  // `style.cssText` on every render frame, which would wipe an inline
  // opacity. A class survives the cssText reset.
  //
  // We re-evaluate every animation frame because the library can swap
  // its `leftPage` / `rightPage` references mid-flip, which would shift
  // which page has --simple. The check is cheap (~20 element
  // attribute lookups).
  const stfBlockEl = container.querySelector('.stf__block');
  const updateHide = () => {
    if (!pageFlipInstance) return;
    if (pageFlipInstance.getState() === 'read') {
      stfBlockEl.querySelectorAll('.spfg-flip-hide, .spfg-flip-unclip').forEach(el => {
        el.classList.remove('spfg-flip-hide');
        el.classList.remove('spfg-flip-unclip');
      });
      return;
    }
    const items = Array.from(stfBlockEl.querySelectorAll('.spf-page.stf__item'));
    let lastActiveIdx = -1;
    let lastCurrentIdx = -1;
    items.forEach((el, i) => {
      const inlineCss = el.style.cssText;
      const isActive = !!el.style.transform && !el.classList.contains('--simple');
      const isCurrentVisible = el.classList.contains('--simple') && inlineCss.indexOf('display: block') !== -1;
      if (isActive) lastActiveIdx = i;
      if (isCurrentVisible) lastCurrentIdx = i;
    });
    // Only hide on backward: active pages earlier in DOM than current.
    const isBackward = lastActiveIdx >= 0 && lastCurrentIdx >= 0 && lastActiveIdx < lastCurrentIdx;
    items.forEach((el) => {
      const inlineCss = el.style.cssText;
      const isCurrentVisible = el.classList.contains('--simple') && inlineCss.indexOf('display: block') !== -1;
      // For a backward flip, the bleed-through happens in the LEFT slot only
      // (current --left page paints over the bottomPage NT-left). The right
      // slot has Hebrew-right at z-1 and no z-3 bottomPage there, so no
      // bleed conflict. Leaving the current right page visible keeps the
      // right slot from going black during the flip.
      const isCurrentLeft = isCurrentVisible && el.classList.contains('--left');
      // bottomPage: z-index 3 inline + no --simple (drawSoft removed it).
      const isBottomPage = !el.classList.contains('--simple') && inlineCss.indexOf('z-index: 3') !== -1;
      if (isBackward && isCurrentLeft) {
        el.classList.add('spfg-flip-hide');
      } else {
        el.classList.remove('spfg-flip-hide');
      }
      if (isBackward && isBottomPage) {
        el.classList.add('spfg-flip-unclip');
      } else {
        el.classList.remove('spfg-flip-unclip');
      }
    });
    requestAnimationFrame(updateHide);
  };
  pageFlipInstance.on('changeState', (e) => {
    const state = e.data;
    if (state === 'flipping' || state === 'user_fold' || state === 'fold_corner') {
      // Run synchronously RIGHT NOW so the very first frame of the
      // animation is already guarded against the bleed-through, then
      // re-run on every animation frame until the flip ends. Without the
      // synchronous first call, frame 0 paints with the bug visible
      // (current spread on top of the destination's bottomPage) before
      // RAF gets a chance to fix it.
      updateHide();
      requestAnimationFrame(updateHide);
    } else if (state === 'read') {
      stfBlockEl.querySelectorAll('.spfg-flip-hide, .spfg-flip-unclip').forEach(el => {
        el.classList.remove('spfg-flip-hide');
        el.classList.remove('spfg-flip-unclip');
      });
    }
  });

  // Also run before EVERY click on the prev/next buttons so by the time
  // the library starts the flip, the hide class is already poised. This
  // catches the small window between mousedown and the library's first
  // render frame where the un-guarded paint can show.
  ['#prev-button', '#next-button'].forEach((sel) => {
    const btn = document.querySelector(sel);
    if (btn) {
      btn.addEventListener('mousedown', () => {
        // Small safety: schedule a few RAFs so the loop is established
        // even if changeState is delayed by the library.
        requestAnimationFrame(() => {
          if (pageFlipInstance && pageFlipInstance.getState() !== 'read') {
            updateHide();
          }
        });
      }, { passive: true });
    }
  });

  // Update UI when the user (or our nav buttons) flips a page.
  pageFlipInstance.on('flip', (e) => {
    const pageNum = e.data;
    const map = buildBookPageFlip._pageToEntry;
    const entryIndex = (map && map[pageNum] !== undefined) ? map[pageNum] : Math.floor(pageNum / 2);
    if (entryIndex !== currentIndex) {
      currentIndex = entryIndex;
      updateBook(false);
    }
    // Retrigger the note-banner drop-in animation whenever the reader
    // lands on the note entry. Force a reflow between class removal
    // and re-add so the keyframes restart even if the user goes
    // backward into the note page.
    try {
      const noteBanner = container.querySelector('[data-entry-index="1"] .note-banner');
      if (noteBanner) {
        if (entryIndex === 1) {
          noteBanner.classList.remove('is-active');
          void noteBanner.offsetWidth;
          noteBanner.classList.add('is-active');
        } else {
          noteBanner.classList.remove('is-active');
        }
      }
    } catch (_) {}
    playFlipSound();
  });
}

function buildBook() {
  if (!BOOK.length) {
    bookStage.innerHTML = `<div class="book-scaler"><article class="spread current" style="opacity:1;"><div class="page page-left note-left"><div class="eyebrow note-kicker">Content error</div><h2 class="note-title">No flipbook content loaded.</h2><p class="note-copy">Check <code>content.js</code> or clear local browser overrides in <a href="admin.html">admin.html</a>.</p></div><div class="page page-right note-right"><div class="paper-grain"></div></div></article></div>`;
    return;
  }
  // Use StPageFlip for the live viewer (true mesh-based corner peel).
  // Fall back to the legacy spread renderer in editor preview-embed mode
  // and any case where the library script didn't load.
  if (typeof St !== 'undefined' && St.PageFlip && !isPreviewEmbed) {
    try {
      buildBookPageFlip();
      updateBook(false);
      return;
    } catch (err) {
      console.error('StPageFlip init failed; falling back to legacy renderer.', err);
      pageFlipInstance = null;
    }
  }
  try {
    bookStage.innerHTML = `<div class="book-scaler">` + BOOK.map((entry, index) => `<article class="spread" data-index="${index}" aria-label="${entry.label || `Page ${index + 1}`}">${renderEntry(entry, index)}</article>`).join("") + `</div>`;
    attachAccordionBehavior();
    attachFacultyCardBehavior();
    attachTocBehavior();
    updateBook(false);
  } catch (error) {
    bookStage.innerHTML = `<div class="book-scaler"><article class="spread current" style="opacity:1;"><div class="page page-left note-left"><div class="eyebrow note-kicker">Preview error</div><h2 class="note-title">This page data needs a quick repair.</h2><p class="note-copy">${String(error && error.message ? error.message : error)}</p></div><div class="page page-right note-right"><div class="paper-grain"></div></div></article></div>`;
  }
}

function attachAccordionBehavior() {
  // Each "page group" -- a .spread in legacy mode, or each .spf-page wrapper
  // in PageFlip mode -- gets its own accordion (only one open per group).
  const containers = pageFlipInstance
    ? Array.from(bookStage.querySelectorAll(".spf-page"))
    : Array.from(bookStage.querySelectorAll(".spread"));
  containers.forEach((spread) => {
    const items = Array.from(spread.querySelectorAll(".support-item"));
    items.forEach((item) => {
      const button = item.querySelector(".support-toggle");
      const panel = item.querySelector(".support-panel");
      if (!button || !panel) return;
      button.addEventListener("click", () => {
        const alreadyOpen = item.classList.contains("is-open");
        items.forEach((other) => {
          other.classList.remove("is-open");
          const otherButton = other.querySelector(".support-toggle");
          const otherPanel = other.querySelector(".support-panel");
          if (otherButton && otherPanel) {
            otherButton.setAttribute("aria-expanded", "false");
            otherPanel.style.maxHeight = "0px";
          }
        });
        if (!alreadyOpen) {
          item.classList.add("is-open");
          button.setAttribute("aria-expanded", "true");
          panel.style.maxHeight = `${panel.scrollHeight}px`;
        }
      });
    });
  });
}

function attachFacultyCardBehavior() {
  const cards = Array.from(bookStage.querySelectorAll(".faculty-card"));
  cards.forEach((card) => {
    card.addEventListener("click", () => {
      const flipped = card.classList.toggle("is-flipped");
      card.setAttribute("aria-pressed", String(flipped));
    });
  });
}

function attachTocBehavior() {
  const tocButtons = Array.from(bookStage.querySelectorAll("[data-target-index]"));
  tocButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const target = Number(button.getAttribute("data-target-index"));
      if (!Number.isNaN(target)) {
        goTo(target);
      }
    });
  });
}

function playFlipSound() {
  if (!soundEnabled) return;
  try {
    const audio = new Audio(FLIP_SOUND_PATH);
    audio.volume = 0.18;
    audio.playbackRate = 0.78;
    audio.play().catch(() => {});
  } catch (error) {}
}

function parseIndexFromHash() {
  const match = window.location.hash.match(/page=(\d+)/i);
  if (!match) return 0;
  const value = Number(match[1]) - 1;
  if (Number.isNaN(value)) return 0;
  return Math.min(Math.max(value, 0), BOOK.length - 1);
}

function updateBook(shouldAnimate = true) {
  if (!BOOK.length) return;
  if (pageFlipInstance) {
    // No spread elements when PageFlip is active; just update chrome.
    pageStatus.textContent = `${String(currentIndex + 1).padStart(2, "0")} / ${String(BOOK.length).padStart(2, "0")}`;
    if (BOOK[currentIndex] && BOOK[currentIndex].label) {
      themeChip.textContent = BOOK[currentIndex].label;
    }
    history.replaceState(null, "", `#page=${currentIndex + 1}`);
    prevButton.disabled = currentIndex === 0;
    nextButton.disabled = currentIndex === BOOK.length - 1;
    return;
  }
  const spreads = Array.from(bookStage.querySelectorAll(".spread"));
  spreads.forEach((spread, index) => {
    spread.className = "spread";
    if (index === currentIndex) spread.classList.add("current");
    else if (index === currentIndex + 1) spread.classList.add("next");
    else if (index === currentIndex - 1) spread.classList.add("prev");
    else if (index > currentIndex) spread.classList.add("after");
    else spread.classList.add("before");
    if (!shouldAnimate) {
      spread.style.transitionDuration = "0ms";
      requestAnimationFrame(() => {
        spread.style.transitionDuration = "";
      });
    }
  });
  pageStatus.textContent = `${String(currentIndex + 1).padStart(2, "0")} / ${String(BOOK.length).padStart(2, "0")}`;
  themeChip.textContent = BOOK[currentIndex].label;
  history.replaceState(null, "", `#page=${currentIndex + 1}`);
  prevButton.disabled = currentIndex === 0;
  nextButton.disabled = currentIndex === BOOK.length - 1;
}

function updateSoundButton() {
  soundToggle.textContent = soundEnabled ? "Sound On" : "Sound Off";
  soundToggle.setAttribute("aria-pressed", String(soundEnabled));
}

function clonePageFace(page, className) {
  const face = document.createElement("div");
  face.className = `flip-face ${className}`;
  const content = document.createElement("div");
  content.className = "flip-face-content";
  const clone = page.cloneNode(true);
  clone.style.width = "100%";
  clone.style.height = "100%";
  content.appendChild(clone);
  face.appendChild(content);
  return face;
}

function createFlipLeaf(outPage, inPage, dir) {
  const leaf = document.createElement("div");
  leaf.className = `flip-leaf ${dir === "fwd" ? "forward" : "backward"}`;
  leaf.appendChild(clonePageFace(outPage, "flip-front"));
  leaf.appendChild(clonePageFace(inPage, "flip-back"));
  return leaf;
}

function prepareRevealTarget(spread, dir) {
  spread.classList.add("reveal-target");
  spread.style.opacity = "1";
  spread.style.transition = "clip-path 1200ms cubic-bezier(0.45, 0.05, 0.25, 1), opacity 120ms linear";
  spread.style.clipPath = dir === "fwd"
    ? "inset(0 50% 0 0 round 18px)"
    : "inset(0 0 0 50% round 18px)";

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      spread.style.clipPath = dir === "fwd"
        ? "inset(0 0 0 0 round 18px)"
        : "inset(0 0 0 0 round 18px)";
    });
  });
}

function clearRevealTarget(spread) {
  spread.classList.remove("reveal-target");
  spread.style.clipPath = "";
  spread.style.transition = "";
  spread.style.opacity = "";
}

function prepareStaticBase(spread, dir) {
  spread.classList.add("static-base");
  spread.style.opacity = "1";
  spread.style.transition = "none";
  spread.style.clipPath = dir === "fwd"
    ? "inset(0 50% 0 0 round 18px)"
    : "inset(0 0 0 50% round 18px)";
}

function clearStaticBase(spread) {
  spread.classList.remove("static-base");
  spread.style.clipPath = "";
  spread.style.transition = "";
  spread.style.opacity = "";
}

function goTo(index) {
  if (!BOOK.length || index === currentIndex || index < 0 || index >= BOOK.length) return;
  if (pageFlipInstance) {
    // Delegate to the library; the 'flip' event handler updates state.
    try {
      const targetPage = (buildBookPageFlip._entryFirstPage && buildBookPageFlip._entryFirstPage[index] !== undefined)
        ? buildBookPageFlip._entryFirstPage[index]
        : (index * 2);
      pageFlipInstance.flip(targetPage, 'bottom');
    } catch (_) {
      // If flip fails (e.g. mid-animation), ignore -- library queues are
      // per-instance and re-clicks while flipping are handled internally.
    }
    return;
  }
  if (isAnimating) return;
  isAnimating = true;
  playFlipSound();

  const dir = index > currentIndex ? "fwd" : "bwd";
  const spreads = Array.from(bookStage.querySelectorAll(".spread"));
  const fromSpread = spreads[currentIndex];
  const toSpread = spreads[index];
  const outPage = fromSpread.querySelector(dir === "fwd" ? ".page-right" : ".page-left");
  const inPage = toSpread.querySelector(dir === "fwd" ? ".page-left" : ".page-right");

  spreads.forEach((spread) => {
    spread.className = "spread";
  });
  fromSpread.classList.add("flip-base");
  toSpread.classList.add("flip-base");
  fromSpread.style.zIndex = "5";
  toSpread.style.zIndex = "4";

  outPage.style.visibility = "hidden";
  prepareStaticBase(fromSpread, dir);
  prepareRevealTarget(toSpread, dir);

  const leaf = createFlipLeaf(outPage, inPage, dir);
  bookStage.appendChild(leaf);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      leaf.classList.add("animating");
    });
  });

  setTimeout(() => {
    /* Commit the new spread state FIRST while the leaf still covers
       everything underneath. clearStaticBase / clearRevealTarget unclip
       the spreads and clear inline styles; updateBook then applies the
       new .current / .prev / .next classes (which set the right opacity
       and z-index for the post-turn layout). */
    outPage.style.visibility = "";
    clearStaticBase(fromSpread);
    clearRevealTarget(toSpread);
    fromSpread.style.zIndex = "";
    toSpread.style.zIndex = "";
    currentIndex = index;
    updateBook(false);
    /* Defer leaf removal two paint frames so the new state is fully
       rendered before the leaf disappears. Eliminates the brief
       half-clipped "gusset" flash that used to show the old spread's
       binding seam through the un-clipped fromSpread. */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        leaf.remove();
        isAnimating = false;
      });
    });
  }, 1220);

  prevButton.disabled = index === 0;
  nextButton.disabled = index === BOOK.length - 1;
}

prevButton.addEventListener("click", () => goTo(currentIndex - 1));
nextButton.addEventListener("click", () => goTo(currentIndex + 1));

document.addEventListener("keydown", (event) => {
  if (event.key === "ArrowRight" || event.key === "PageDown") {
    event.preventDefault();
    goTo(currentIndex + 1);
  }
  if (event.key === "ArrowLeft" || event.key === "PageUp") {
    event.preventDefault();
    goTo(currentIndex - 1);
  }
  if (event.key === "Home") {
    event.preventDefault();
    goTo(0);
  }
  if (event.key === "End") {
    event.preventDefault();
    goTo(BOOK.length - 1);
  }
});

window.addEventListener("hashchange", () => {
  if (!BOOK.length) return;
  const nextIndex = parseIndexFromHash();
  if (nextIndex !== currentIndex) {
    currentIndex = nextIndex;
    updateBook(false);
  }
});

window.addEventListener("storage", (event) => {
  if (event.key !== CONTENT_STORAGE_KEY) return;
  BOOK = loadBookData();
  currentIndex = Math.min(currentIndex, Math.max(BOOK.length - 1, 0));
  buildBook();
});

window.addEventListener("message", (event) => {
  const { data } = event;
  if (!data || typeof data !== "object") return;
  if (data.type === "flipbook:update" && Array.isArray(data.content)) {
    BOOK = applyMasterSpreadTemplate(normalizeContent(data.content));
    currentIndex = Math.min(currentIndex, Math.max(BOOK.length - 1, 0));
    buildBook();
    return;
  }
  if (data.type === "flipbook:navigate" && typeof data.index === "number") {
    goTo(data.index);
  }
});

soundToggle.addEventListener("click", () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem(SOUND_STORAGE_KEY, String(soundEnabled));
  updateSoundButton();
});

if (isPreviewEmbed) {
  document.body.classList.add("preview-embed");
  updatePreviewScale();
  window.addEventListener("resize", updatePreviewScale);
}

BOOK = loadBookData();
currentIndex = parseIndexFromHash();
updateSoundButton();
buildBook();
updateBookScale();
</script>
</body>
</html>
